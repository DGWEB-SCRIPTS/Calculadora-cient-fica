<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Em Atualização!!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-page: #0d0d0f;
    --bg-calc: #16161a;
    --bg-display: #09090b;
    --text-main: #ededed;
    --text-muted: #a1a1aa;
    --accent-color: #6366f1; /* Indigo premium */
    --accent-hover: #4f46e5;
    --btn-bg: #27272a;
    --btn-hover: #3f3f46;
    --btn-op: #1e1e24;
    --btn-op-text: #6366f1;
    --error-color: #ef4444;
    --success-color: #10b981;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-page);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    gap: 25px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 30px 10px;
    box-sizing: border-box;
  }

  .calculadora {
    background: var(--bg-calc);
    border-radius: 24px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .topo-controles {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    gap: 10px;
  }
  .btn-topo {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 8px 0;
    border-radius: 10px;
    background: var(--btn-bg);
    color: var(--text-muted);
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.2s;
  }
  .btn-topo:hover {
    background: var(--btn-hover);
    color: var(--text-main);
  }
  
  .display {
    background: var(--bg-display);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    text-align: right;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.02);
  }
  .display-expr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--text-muted);
    min-height: 24px;
    overflow-x: auto;
    white-space: nowrap;
    margin-bottom: 8px;
  }
  .display-value {
    font-family: 'Inter', sans-serif;
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: -1px;
    min-height: 60px;
    overflow-x: auto;
    white-space: nowrap;
    color: #fff;
    scrollbar-width: none;
  }
  .display-value::-webkit-scrollbar { display: none; }
  .display-value.erro { color: var(--error-color); font-size: 2rem;}

  .toggle-modo {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 12px;
    background: rgba(99, 102, 241, 0.1);
    color: var(--accent-color);
    border: 1px solid rgba(99, 102, 241, 0.2);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .toggle-modo:hover {
    background: rgba(99, 102, 241, 0.15);
  }

  .botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button.tecla {
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    padding: 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--text-main);
    transition: all 0.15s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  button.tecla:active { transform: scale(0.92); }
  button.tecla:hover { background: var(--btn-hover); }
  
  button.tecla.operador { 
    background: var(--btn-op); 
    color: var(--btn-op-text); 
    font-size: 1.4rem; 
  }
  button.tecla.operador:hover { background: #2a2a35; }
  
  button.tecla.acao { color: var(--error-color); font-weight: 600;}
  
  button.tecla.igual { 
    background: var(--accent-color); 
    color: white; 
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }
  button.tecla.igual:hover { background: var(--accent-hover); }

  #btnZero, #btnZeroCientifico { grid-column: 1 / 3; } /* Zero agora ocupa 2 espaços para simetria */

  #historico, #detalhes {
    display: none;
    background: var(--bg-display);
    color: var(--text-main);
    padding: 20px;
    margin-top: 20px;
    max-height: 500px;
    overflow-y: auto;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);

  #historico div {

  .resultado-final { font-weight: 600; color: var(--success-color) !important; font-size: 1.1rem; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2) !important; background: rgba(16, 185, 129, 0.05) !important;}
  .erro-didatico { color: var(--error-color) !important; border: 1px solid rgba(239, 68, 68, 0.2) !important; background: rgba(239, 68, 68, 0.05) !important; }
  
  .conta-visual {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-display);
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 1.2rem;
      overflow-x: auto;
      white-space: nowrap;
      display: inline-block;
      min-width: 90%;
      border: 1px solid rgba(255,255,255,0.02);
  }
  .divisao-grid { display: flex; flex-direction: column; }
  .div-linha { display: flex; }
  .div-bloco { padding: 0 5px; text-align: right; letter-spacing: 2px;}
  .div-chave { border-left: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); padding: 0 8px; margin-left: 5px;}
  
  .corte-strike { position: relative; display: inline-block; }
  .corte-strike::after { content: ''; position: absolute; left: -2px; top: 50%; width: 120%; height: 2px; background: var(--error-color); transform: rotate(-25deg); }
  .linha-traco { border-bottom: 2px solid var(--text-muted); width: 100%; margin: 8px 0; }

  .bloco-termo { display: inline-block; position: relative; }
  
  .potencia {
    font-size: 0.65em;
    position: relative;
    top: -0.8em;
    color: var(--accent-color);
    font-weight: 600;
    display: inline-block;
  }

  .fracao {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    text-align: center;
    padding: 0 4px;
  }
  .fracao-num { border-bottom: 1.5px solid currentColor; padding: 0 2px; line-height: 1.2; }
  .fracao-den { padding: 0 2px; line-height: 1.2; }

  /* Scrollbar customizada */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-display); border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--btn-hover); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @media (max-width: 500px) {
    body {
      padding: 15px 10px;
      justify-content: flex-start; /* No celular alinha ao topo para não cortar com o teclado */
      align-items: center;
    }
    .calculadora {
      padding: 18px;
      border-radius: 20px;
    }
    .display {
      padding: 15px;
      margin-bottom: 15px;
    }
    .display-value {
      font-size: 2.4rem;
      min-height: 50px;
    }
    .botoes {
      gap: 8px;
    }
    button.tecla {
      padding: 14px 8px;
      font-size: 1.15rem;
      border-radius: 10px;
    }
    button.tecla.operador {
      font-size: 1.25rem;
    }
  }

  .ads-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 480px;
    width: 100%;
    margin: 20px auto;
  }
  .ads-lateral {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 120px;
    height: 600px;
    z-index: 0;
  }
  .ads-lateral.left { left: 10px; }
  .ads-lateral.right { right: 10px; }
  @media (max-width: 900px) {
    .ads-lateral { display: none; }
  }
</style>

<script>
const displayExpr = document.getElementById("displayExpr");
const displayValue = document.getElementById("displayValue");
const historicoDiv = document.getElementById("historico");
const detalhesDiv = document.getElementById("detalhes");
const tecladoNormal = document.getElementById("tecladoNormal");
const tecladoCientifico = document.getElementById("tecladoCientifico");
const mtBtnGeral = document.getElementById("mtBtnGeral");

const btnSecond = document.getElementById("btnSecond");
const btnDeg = document.getElementById("btnDeg");
const btnSin = document.getElementById("btnSin");
const btnCos = document.getElementById("btnCos");
const btnTan = document.getElementById("btnTan");
const btnLg = document.getElementById("btnLg");
const btnLn = document.getElementById("btnLn");

let expressao = "";
let expressaoParaCalculo = "";
let ultimosPassos = [];
let historico = JSON.parse(localStorage.getItem("calcHistorico")) || [];
let estado = { modeDeg: true, secondState: false };

function fixEpsilon(val) {
    if (!isFinite(val) || Math.abs(val) > 1e15) return val;
    return parseFloat(val.toPrecision(14));
}

function formatarNumero(n) {
    if (!isFinite(n)) return String(n);
    // Previne crash do toFixed em números excessivamente grandes
    if (Math.abs(n) >= 1e20) return n.toExponential(10).replace('.', ',');
    return new Intl.NumberFormat('pt-BR', {
        maximumFractionDigits: 10,
        minimumFractionDigits: 0
    }).format(n);
}

function mdc(a, b) {
    a = Math.abs(a);
    b = Math.abs(b);
    return b === 0 ? a : mdc(b, a % b);
}

function formatFrac(n, d) {
    return `<div class="fracao">
        <span class="fracao-num">${n}</span>
        <span>${d}</span>
    </div>`;
}

function gerarExplicacaoFracao(f1, f2, op) {
    let n1 = f1.num, d1 = f1.den;
    let n2 = f2.num, d2 = f2.den;
    let resN, resD;

    switch(op) {
        case '+': resN = n1*d2 + n2*d1; resD = d1*d2; break;
        case '-': resN = n1*d2 - n2*d1; resD = d1*d2; break;
        case '*': resN = n1*n2; resD = d1*d2; break;
        case '/': resN = n1*d2; resD = d1*n2; break;
    }

    let divisor = mdc(resN, resD);
    resN /= divisor;
    resD /= divisor;

    return {
        passo: `Operação com frações`,
        isHtml: true,
        visual: `
        <div style="padding:10px; font-family:'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.2rem;">
            ${formatFrac(n1,d1)} ${op} ${formatFrac(n2,d2)} = ${formatFrac(resN,resD)}
        </div>
        `,
        resN, resD
    };
}

function createCharBlock(baseChar, supChar = ' ', isStrike = false) {
    let baseStyles = "position:relative; display:inline-block; width:1ch; text-align:center;";
    let supHtml = '';
    if (supChar !== ' ') {
        supHtml = `<span style="position:absolute; bottom:90%; left:0; right:0; margin:auto; text-align:center; color:var(--accent-color); font-weight:600; font-size:0.85em; line-height:1;">${supChar}</span>`;
    }
    let baseSpan = isStrike ? `<span class="corte-strike">${baseChar}</span>` : baseChar;
    return `<span style="${baseStyles}">${supHtml}${baseSpan}</span>`;
}

function gerarExplicacaoSoma(a, b) {
    // Se houver números negativos (ex: somar com uma dívida), usamos um fallback seguro
    if (a < 0 || b < 0) {
        return {passo: `Calculando ${a} + ${b}`, isHtml: true, visual: `<div class="conta-visual" style="font-size:1.3rem; padding: 20px;">${a} + (${b}) = <span style="color: var(--success-color);">${a+b}</span></div>`};
    }

    let sA = String(a), sB = String(b);
    let decA = sA.includes('.') ? sA.split('.')[1].length : 0;
    let decB = sB.includes('.') ? sB.split('.')[1].length : 0;
    const maxDec = Math.max(decA, decB);
    
    sA = a.toFixed(maxDec); sB = b.toFixed(maxDec);
    let resStr = (a + b).toFixed(maxDec);

    const maxLength = Math.max(sA.length, sB.length, resStr.length);
    sA = sA.padStart(maxLength, ' '); sB = sB.padStart(maxLength, ' ');
    resStr = resStr.padStart(maxLength, ' ');
    
    let carriesArr = Array(maxLength).fill(' ');
    let carry = 0;
    for (let i = maxLength - 1; i >= 0; i--) {
        if (sA[i] === '.') continue;
        let dA = sA[i] === ' ' ? 0 : parseInt(sA[i]);
        let dB = sB[i] === ' ' ? 0 : parseInt(sB[i]);
        let sum = dA + dB + carry;
        carry = Math.floor(sum / 10);
        if (carry > 0) {
            let prevJ = i - 1;
            while(prevJ >= 0 && sA[prevJ] === '.') prevJ--;
            if (prevJ >= 0) carriesArr[prevJ] = carry;
        }
    }
    
    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    let sAHtml = "";
    for(let i=0; i<maxLength; i++) {
        let topVal = carriesArr[i];
        sAHtml += createCharBlock(sA[i], topVal);
    }
    
    const offsetEsq = 2;
    linhas.push(sp(offsetEsq) + sAHtml);
    linhas.push("+ " + sB);
    linhas.push("-".repeat(maxLength + offsetEsq));
    linhas.push(sp(offsetEsq) + `<span style="color: var(--success-color);">${resStr}</span>`);
    
    let html = `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">\n${linhas.join('\n')}\n</div>`;
    
    return {passo: `Calculando ${a} + ${b}`, isHtml: true, visual: html};
}

function gerarExplicacaoSubtracao(a, b) {
    let negativo = false;
    if (b > a) { let temp = a; a = b; b = temp; negativo = true; }

    let sA = String(a), sB = String(b);
    let decA = sA.includes('.') ? sA.split('.')[1].length : 0;
    let decB = sB.includes('.') ? sB.split('.')[1].length : 0;
    const maxDec = Math.max(decA, decB);
    
    sA = a.toFixed(maxDec).replace('.', '');
    sB = b.toFixed(maxDec).replace('.', '').padStart(sA.length, '0');
    
    let numA = sA.split('').map(Number);
    let numB = sB.split('').map(Number);
    
    let cortes = Array(numA.length).fill(false);
    let emCima = Array(numA.length).fill('&nbsp;');
    let resultado = [];
    
    for (let i = numA.length - 1; i >= 0; i--) {
        if (numA[i] < numB[i]) {
            let vizinho = i - 1;
            while (vizinho >= 0 && numA[vizinho] === 0) {
                numA[vizinho] = 9; cortes[vizinho] = true; emCima[vizinho] = '9';
                vizinho--;
            }
            if (vizinho >= 0) {
                numA[vizinho] -= 1; cortes[vizinho] = true; emCima[vizinho] = String(numA[vizinho]);
                emCima[i] = '1'; numA[i] += 10;
            }
        }
        resultado.unshift(numA[i] - numB[i]);
    }

    let origA = a.toFixed(maxDec).split('');
    let posPonto = origA.indexOf('.');
    
    let html = `<div class="conta-visual sub-grid">`;
    html += `<div class="sub-num">`;
    let offset = 0;
    for(let i=0; i<origA.length; i++) {
        if(origA[i] === '.') { html += `.`; offset++; continue; }
        let topVal = emCima[i-offset];
        let supHtml = (topVal !== '&nbsp;' && topVal !== ' ') ? `<sup style="position:absolute; top:-12px; left:-2px; color:var(--accent-color); font-size:0.85rem; font-family:'Inter', sans-serif; font-weight:600;">${topVal}</sup>` : '';
        if(cortes[i-offset]) {
             html += `<span class="corte-strike" style="position:relative; width:16px; text-align:center; display:inline-block;">${supHtml}${origA[i]}</span>`;
        } else {
             html += `<span style="position:relative; width:16px; text-align:center; display:inline-block;">${supHtml}${origA[i]}</span>`;
        }
    }
    html += `</div><div class="sub-num">- ${b.toFixed(maxDec).padStart(origA.length, ' ').replace(/ /g, '&nbsp;')}</div>`;
    html += `<div class="linha-traco"></div>`;
    let resStr = (a - b).toFixed(maxDec).padStart(origA.length, ' ').replace(/ /g, '&nbsp;');
    html += `<div class="sub-num" style="color: var(--success-color);">${negativo ? '-' : '&nbsp;'}${resStr}</div></div>`;

    return {passo: `Calculando ${negativo ? b : a} - ${negativo ? a : b}`, isHtml: true, visual: html};
}

function gerarExplicacaoMultiplicacao(a, b) {
    let absA = Math.abs(a);
    let absB = Math.abs(b);
    let isNeg = (a < 0) !== (b < 0) && (a !== 0 && b !== 0);
    
    let sA = String(absA);
    let sB = String(absB);
    
    // Se os números forem minúsculos/enormes e o JS usar notação científica (ex: 1e-10), fazemos fallback visual seguro
    if (sA.includes('e') || sB.includes('e')) {
        return {passo: `Calculando ${a} × ${b}`, isHtml: false, visual: `Multiplicação direta:\n${a} × ${b} = ${a*b}`};
    }
    
    let resNative = String(absA * absB);
    const cleanB = sB.replace('.', '');
    
    const width = Math.max(sA.length + 2, sB.length + 2, resNative.length + (isNeg ? 1 : 0));
    let intermediarios = [];
    
    let bIndex = 0;
    for (let i = sB.length - 1; i >= 0; i--) {
        if (sB[i] === '.') continue;
        const d2 = parseInt(sB[i]); 
        let parcial = '', carry = 0; 
        let carriesArr = Array(sA.length).fill(' ');
        
        for (let j = sA.length - 1; j >= 0; j--) {
            if (sA[j] === '.') continue;
            const produto = (parseInt(sA[j]) * d2) + carry;
            parcial = (produto % 10) + parcial; 
            carry = Math.floor(produto / 10);
            if (carry > 0) {
                let prevJ = j - 1;
                while(prevJ >= 0 && sA[prevJ] === '.') prevJ--;
                if (prevJ >= 0) carriesArr[prevJ] = carry;
            }
        }
        if (carry > 0) parcial = carry + parcial;
        
        intermediarios.push({ carries: carriesArr.join(''), produto: parcial + ' '.repeat(bIndex) });
        bIndex++;
    }
    
    const firstCarryLine = intermediarios.length > 0 ? intermediarios[0].carries : '';
    
    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    
    let sAHtml = sp(width - sA.length);
    for(let i=0; i<sA.length; i++) {
        let topVal = firstCarryLine[i] || ' ';
        let supHtml = (topVal !== ' ') ? `<sup style="position:absolute; top:-12px; left:-2px; color:var(--accent-color); font-size:0.85rem; font-family:'Inter', sans-serif; font-weight:600;">${topVal}</sup>` : '';
        sAHtml += `<span style="position:relative; display:inline-block;">${supHtml}${sA[i]}</span>`;
    }
    linhas.push(sAHtml);
    
    linhas.push(sp(width - sB.length - 2) + "× " + sB);
    linhas.push("-".repeat(width));
    
    if (cleanB.length > 1) {
        intermediarios.forEach(item => { linhas.push(sp(width - item.produto.length) + item.produto); });
        linhas.push("-".repeat(width));
    }
    
    let finalStr = isNeg ? '-' + resNative : resNative;
    linhas.push(sp(width - finalStr.length) + finalStr);
    
    let html = `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">\n${linhas.join('\n')}\n</div>`;
    
    return {passo: `Calculando ${a} × ${b}`, isHtml: true, visual: html};
}

function gerarExplicacaoDivisao(dividendo, divisor) {
    if (divisor === 0) return {passo: "Erro", isHtml: false, visual: "Indefinido"};
    
    let html = `<div style="display:flex; justify-content:center; margin-bottom: 15px; font-family:'Inter', sans-serif; align-items: center; gap: 10px;">
        <div class="fracao" style="font-size: 1.5rem; color: var(--accent-color); font-weight: 500;">
            <span class="fracao-num">${dividendo}</span>
            <span>${divisor}</span>
        </div>
        <span style="color: var(--text-muted); font-size: 1.2rem;">=</span>
    </div>`;

    let d1 = String(dividendo);
    let d2 = String(divisor);
    let dec1 = d1.includes('.') ? d1.split('.')[1].length : 0;
    let dec2 = d2.includes('.') ? d2.split('.')[1].length : 0;
    let maxDec = Math.max(dec1, dec2);
    let divInt = Math.round(dividendo * Math.pow(10, maxDec));
    let divisorInt = Math.round(divisor * Math.pow(10, maxDec));

    let dStr = String(divInt);
    let maxCasas = 5;

    let qStr = "";
    let valorAtualStr = "";
    let pos = 0;
    let decimalAdicionado = false;
    let restosVistos = new Map();

    let passosSubtracao = [];
    
    let iteracoes = 0;
    const MAX_ITER = 50;

    while (pos < dStr.length || (parseInt(valorAtualStr||"0") !== 0 && qStr.replace('.','').length < maxCasas + 2)) {
        iteracoes++;
        if (iteracoes > MAX_ITER) break;
        
        if (pos < dStr.length) {
            valorAtualStr += dStr[pos];
            pos++;
        } else {
            if (!decimalAdicionado) {
                if (qStr === "") qStr = "0";
                qStr += ".";
                decimalAdicionado = true;
            }
            valorAtualStr += "0";
            pos++;

            let estado = valorAtualStr;
            if (restosVistos.has(estado)) {
                qStr += "...";
                break;
            }
            restosVistos.set(estado, true);
        }

        let valorAtual = parseInt(valorAtualStr, 10);

        if (valorAtual < divisorInt) {
            if (qStr !== "" && qStr !== "0.") qStr += "0";
            else if (pos === dStr.length && qStr === "") qStr += "0";
            continue;
        }

        let q = Math.floor(valorAtual / divisorInt);
        qStr += String(q);
        let sub = q * divisorInt;
        let novoResto = valorAtual - sub;

        passosSubtracao.push({ minuendo: valorAtual, subtraendo: sub, resto: novoResto, posFinal: pos });

        valorAtualStr = String(novoResto);
        if (novoResto === 0 && pos >= dStr.length) break;
    }
    if (qStr === "") qStr = "0";
    if (qStr.endsWith('.')) qStr = qStr.slice(0, -1);

    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    const offsetEsq = 2;

    let chave1 = ` | <span style="color:var(--text-main)">${divisorInt}</span>`;
    // CORREÇÃO: Aqui estava o +<span... Agora é apenas um traço -<span... para formar a chave perfeitamente reta.
    let chave2 = ` -<span style="color:var(--text-muted)">${"-".repeat(Math.max(String(divisorInt).length, qStr.length))}</span>`;
    let chave3 = ` | <span style="color:var(--success-color)">${qStr}</span>`;

    linhas.push(sp(offsetEsq) + dStr + chave1);
    linhas.push(sp(offsetEsq + dStr.length) + chave2);
    linhas.push(sp(offsetEsq + dStr.length) + chave3);

    for (let k = 0; k < passosSubtracao.length; k++) {
        let passo = passosSubtracao[k];
        let sA = String(passo.minuendo);
        let sB = String(passo.subtraendo).padStart(sA.length, '0');
        let numA = sA.split('').map(Number);
        let numB = sB.split('').map(Number);
        let cortes = Array(numA.length).fill(false);
        let emCima = Array(numA.length).fill(' ');
        let teveCorte = false;

        for (let i = numA.length - 1; i >= 0; i--) {
            if (numA[i] < numB[i]) {
                teveCorte = true;
                let vizinho = i - 1;
                while (vizinho >= 0 && numA[vizinho] === 0) {
                    numA[vizinho] = 9; cortes[vizinho] = true; emCima[vizinho] = '9';
                    vizinho--;
                }
                if (vizinho >= 0) {
                    numA[vizinho] -= 1; cortes[vizinho] = true; emCima[vizinho] = String(numA[vizinho]);
                    emCima[i] = '1'; numA[i] += 10;
                }
            }
        }

        let startIdx = passo.posFinal - sA.length;

        let minHtml = sp(offsetEsq + startIdx);
        for(let i=0; i<sA.length; i++) {
            let topVal = emCima[i];
            let isStrike = cortes[i];
            minHtml += createCharBlock(sA[i], topVal, isStrike);
        }
        linhas.push(minHtml);

        let subStr = String(passo.subtraendo);
        let padSub = passo.posFinal - subStr.length;
        linhas.push(`<span style="color:var(--error-color)">${sp(offsetEsq + padSub - 1)}-${subStr}</span>`);

        let tracoLen = sA.length;
        linhas.push(sp(offsetEsq + startIdx) + `<span style="color:var(--text-muted)">${"-".repeat(tracoLen)}</span>`);
    }

    if (passosSubtracao.length > 0) {
        let ultimoPasso = passosSubtracao[passosSubtracao.length - 1];
        let restoStr = String(ultimoPasso.resto);
        let startIdx = ultimoPasso.posFinal - restoStr.length;
        linhas.push(sp(offsetEsq + startIdx) + `<span style="color:var(--text-main)">${restoStr}</span>`);
    } else {
        linhas.push(sp(offsetEsq + dStr.length - 1) + `<span style="color:var(--text-main)">0</span>`);
    }

    html += `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">`;
    html += linhas.join("\n");
    html += `</div>`;

    return {passo: `Calculando ${dividendo} ÷ ${divisor}`, isHtml: true, visual: html};
}

function gerarExplicacaoRaizQuadrada(n) {

function gerarExplicacaoPotencia(base, expoente) {
    let html = `<div style="font-family:'Inter',sans-serif; color:var(--text-muted); margin-bottom:10px;">Para calcular <strong style="color:var(--accent-color); font-size:1.2em;">${base}<span style="vertical-align: super; font-size: 0.7em;">${expoente}</span></strong>, multiplicamos ${base} por si mesmo, ${expoente} vezes.</div>`;
    if (expoente > 1 && expoente <= 10 && Number.isInteger(expoente)) {

        for (let i = 1; i < expoente; i++) {

    }
    return { passo: `Calculando potência`, isHtml: true, visual: html };
}

function gerarExplicacaoFatorial(n) {
    if (n < 0 || !Number.isInteger(n)) return {passo: "Erro", isHtml: false, visual: "Erro de Domínio (Fatorial só se aplica a inteiros positivos)."};
    if (n > 170) return {passo: "Erro", isHtml: false, visual: "Número muito grande para fatorial (limite: 170)."};
    if (n === 0 || n === 1) return {passo: `Calculando ${n}!`, isHtml: false, visual: `${n}! = 1`};
    let texto = `${n}! = ${n}`;
    let resultado = 1;
    for (let i = n - 1; i > 1; i--) { texto += ` × ${i}`; resultado *= i; }
    resultado *= n; texto += ` × 1\n`;
    if (n <= 8 && n >= 2) {
        texto += `\nPasso a passo das multiplicações:\n`;
        let calcTemp = n;
        for (let i = n - 1; i >= 2; i--) {
            texto += `\n--- Multiplicando por ${i} ---\n`;
            texto += gerarExplicacaoMultiplicacao(calcTemp, i).visual + `\n`;
            calcTemp *= i;
        }
    } else if (n > 8) {
        texto += `\n(Passo a passo visual omitido por ser muito longo)\nValor do fatorial: ${resultado}`;
    }
    return {passo: `Calculando ${n}!`, isHtml: false, visual: texto};
}

function gerarExplicacaoTrig(funcao, anguloRad, anguloOriginal, emDeg, resultadoFinal) {
    let texto = `Calculando ${funcao}(${anguloOriginal}${emDeg && ['sin', 'cos', 'tan'].includes(funcao) ? '°' : ' rad'}).\n`;
    if (emDeg && ['sin', 'cos', 'tan'].includes(funcao)) {

    return {passo: `Calculando ${funcao}(${anguloOriginal})`, isHtml: false, visual: texto};
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
}

function formatarParaDisplay(expr) {
    if (!expr) return "";
    
    let text = expr.replace(/\d+(?:,\d+)?/g, match => {
        let parts = match.split(',');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.join(',');
    });

    let placeholders = [];
    function extractParens(str) {
        let prev;
        do {
            prev = str;
            str = str.replace(/\(([^()]+)\)/g, (match, inner) => {
                placeholders.push(`(${inner})`);
                return `\x01${placeholders.length - 1}\x02`;
            });
        } while (str !== prev);
        return str;
    }
    
    let safeStr = extractParens(text);
    let htmlPlaceholders = [];
    
    // Agora o TokenPattern não captura HTML quebrado, ele captura blocos validados (Placeholders 3 e 4)
    const tokenPattern = `(?:[a-zA-Z]*\\x01\\d+\\x02|[\\d.,]+|\\x03\\d+\\x04)`;

    const powerRegex = new RegExp(`(${tokenPattern})\\^(${tokenPattern})`, 'g');
    let prevSafe;
    do {
        prevSafe = safeStr;
        safeStr = safeStr.replace(powerRegex, (match, p1, p2) => {
            htmlPlaceholders.push(`<span class="bloco-termo">${p1}<span class="potencia">${p2}</span></span>`);
            return `\x03${htmlPlaceholders.length - 1}\x04`;
        });
    } while (safeStr !== prevSafe);

    const fracRegex = new RegExp(`(${tokenPattern})\\/(${tokenPattern})`, 'g');
    do {
        prevSafe = safeStr;
        safeStr = safeStr.replace(fracRegex, (match, p1, p2) => {
            htmlPlaceholders.push(`<span class="fracao"><span class="fracao-num">${p1}</span><span class="fracao-den">${p2}</span></span>`);
            return `\x03${htmlPlaceholders.length - 1}\x04`;
        });
    } while (safeStr !== prevSafe);
    
    const fracIncRegex = new RegExp(`(${tokenPattern})\\/(?!\\d|\\x01|\\x03|[a-zA-Z])`, 'g');
    safeStr = safeStr.replace(fracIncRegex, (match, p1) => {
        htmlPlaceholders.push(`<span class="fracao"><span class="fracao-num">${p1}</span><span class="fracao-den">&nbsp;</span></span>`);
        return `\x03${htmlPlaceholders.length - 1}\x04`;
    });

    let prevHtml;
    do {
        prevHtml = safeStr;
        safeStr = safeStr.replace(/\x03(\d+)\x04/g, (match, id) => htmlPlaceholders[id]);
    } while (safeStr !== prevHtml);

    let prev;
    do {
        prev = safeStr;
        safeStr = safeStr.replace(/\x01(\d+)\x02/g, (match, id) => placeholders[id]);
    } while (safeStr !== prev);

    return safeStr;
}

const precedencia = { '+': 1, '-': 1, '*': 2, '/': 2, 'u-': 3, '^': 4, 'sqrt': 5, '!': 5, '%': 5 };
const associatividade = { '^': 'direita', '+': 'esquerda', '-': 'esquerda', '*': 'esquerda', '/': 'esquerda', 'u-': 'direita', '!': 'esquerda', '%': 'esquerda', 'sqrt': 'direita' };
const constantes = { 'pi': Math.PI, 'e': Math.E };

function tokenize(expr) {
    let calcExpr = expr.replace(/\./g, '').replace(/,/g, '.').replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-').replace(/π/g, 'pi').replace(/√/g, 'sqrt');
    
    // Injeta multiplicações implícitas para constantes e parênteses (ex: 2pi -> 2*pi, 2(3) -> 2*(3))
    calcExpr = calcExpr.replace(/(\d)(pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt|\()/ig, '$1*$2');
    calcExpr = calcExpr.replace(/(\))(pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt|\(|\d)/ig, '$1*$2');
    calcExpr = calcExpr.replace(/(pi|e)(\d|\()/ig, '$1*$2');

    const tokens = []; const regex = /(\d+\.?\d*|\.\d+)|(pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt)|([+\-*\/^()!,%])/ig;
    let match; let ultimoTokenTipo = null;
    while ((match = regex.exec(calcExpr)) !== null) {
        const token = match[0];
        if (match[1]) { tokens.push({ type: 'numero', value: parseFloat(token) }); ultimoTokenTipo = 'numero'; }
        else if (match[2]) {
            const tokenLower = token.toLowerCase();
            if (tokenLower === 'pi' || tokenLower === 'e') { tokens.push({ type: 'numero', value: constantes[tokenLower] }); ultimoTokenTipo = 'numero'; }
            else { tokens.push({ type: 'funcao', value: tokenLower }); ultimoTokenTipo = 'funcao'; }
        } else if (match[3]) {
            if (token === '-' && (ultimoTokenTipo === null || ultimoTokenTipo === 'operador' || ultimoTokenTipo === 'paren_esq')) {
                tokens.push({ type: 'operador', value: 'u-' });
            } else { tokens.push({ type: 'operador', value: token }); }
            ultimoTokenTipo = (token === '(') ? 'paren_esq' : (token === ')') ? 'paren_dir' : 'operador';
        }
    }
    return tokens;
}

function toRPN(tokens) {
    const saida = []; const operadores = [];
    tokens.forEach(token => {
        if (token.type === 'numero') saida.push(token);
        else if (token.type === 'funcao') operadores.push(token);
        else if (token.value === ',') {
            while (operadores.length > 0 && operadores[operadores.length - 1].value !== '(') saida.push(operadores.pop());
        } else if (token.type === 'operador') {
            if (token.value === '(') operadores.push(token);
            else if (token.value === ')') {
                while (operadores.length > 0 && operadores[operadores.length - 1].value !== '(') saida.push(operadores.pop());
                if (operadores.length === 0) throw new Error("Erro: Parênteses.");
                operadores.pop();
                if (operadores.length > 0 && operadores[operadores.length - 1].type === 'funcao') saida.push(operadores.pop());
            } else {
                const op1 = token.value;
                while (operadores.length > 0) {
                    const op2 = operadores[operadores.length - 1].value;
                    if (op2 === '(') break;
                    const p1 = precedencia[op1] || 0; const p2 = precedencia[op2] || 0; const a1 = associatividade[op1] || 'esquerda';
                    if ((a1 === 'esquerda' && p1 <= p2) || (a1 === 'direita' && p1 < p2)) saida.push(operadores.pop());
                    else break;
                }
                operadores.push(token);
            }
        }
    });
    while (operadores.length > 0) {
        const op = operadores.pop();
        if (op.value === '(') throw new Error("Erro: Parênteses.");
        saida.push(op);
    }
    return saida;
}

function evalRPNwithSteps(rpn) {
    const pilha = []; const logs = [];
    rpn.forEach(token => {
        if (token.type === 'numero') { 
            pilha.push({ val: token.value, num: token.value, den: 1, isFrac: false }); 
        } else {
            let explicacao;
            let resObj = { val: 0, num: 0, den: 1, isFrac: false };

            if (token.value === 'u-' || token.value === '!' || token.value === '%' || token.type === 'funcao') {
                if (pilha.length < 1) throw new Error("Sintaxe inválida");
                const aObj = pilha.pop(); const a = aObj.val;
                let resultado;
                switch(token.value) {
                    case 'u-': 
                        resultado = fixEpsilon(-a); 
                        if(aObj.isFrac) {
                            resObj.isFrac = true; resObj.num = -aObj.num; resObj.den = aObj.den;
                            explicacao = {passo: `Invertendo sinal da fração`, isHtml: true, visual: `<div style="padding:10px;">Fica: ${formatFrac(resObj.num, resObj.den)}</div>`}; 
                        } else { explicacao = {passo: `Invertendo sinal`, isHtml: false, visual: `Oposto de ${a}: ${-a}`}; }
                        break;
                    case '!':
                        if (a < 0 || !Number.isInteger(a)) throw new Error("Erro de Domínio (Fatorial)");
                        if (a > 170) throw new Error("Número muito grande");
                        resultado = 1; for (let i = 2; i <= a; i++) resultado *= i;
                        explicacao = gerarExplicacaoFatorial(a); break;
                    case '%': resultado = fixEpsilon(a / 100); explicacao = gerarExplicacaoPorcentagem(a); break;
                    case 'sqrt': if (a < 0) throw new Error("Erro de Domínio"); resultado = fixEpsilon(Math.sqrt(a)); explicacao = gerarExplicacaoRaizQuadrada(a); break;
                    case 'ln': if (a <= 0) throw new Error("Erro de Domínio"); resultado = Math.log(a); explicacao = gerarExplicacaoLog('ln', a); break;
                    case 'lg': if (a <= 0) throw new Error("Erro de Domínio"); resultado = Math.log10(a); explicacao = gerarExplicacaoLog('lg', a); break;
                    case 'sin': case 'cos': case 'tan':
                        let anguloRad = estado.modeDeg ? a * Math.PI / 180 : a;
                        if (token.value === 'tan' && Math.abs(Math.cos(anguloRad)) < 1e-12) throw new Error("Indefinido");
                        resultado = fixEpsilon(Mathtoken.value);
                        if (Math.abs(resultado) < 1e-14) resultado = 0;
                        explicacao = gerarExplicacaoTrig(token.value, anguloRad, a, estado.modeDeg, resultado); break;
                    case 'asin': case 'acos': case 'atan':
                        if (['asin', 'acos'].includes(token.value) && (a < -1 || a > 1)) throw new Error("Erro de Domínio");
                        resultado = fixEpsilon(Mathtoken.value);
                        if (estado.modeDeg) resultado = resultado * 180 / Math.PI;
                        if (Math.abs(resultado) < 1e-14) resultado = 0;
                        explicacao = gerarExplicacaoTrig(token.value, a, a, estado.modeDeg, resultado); break;
                }
                if (token.value !== 'u-') { resObj.val = resultado; resObj.num = resultado; resObj.den = 1; resObj.isFrac = false; }
                else { resObj.val = resultado; }
                
                if (token.value === '%') resObj.isPercent = true;
            } else {
                if (pilha.length < 2) throw new Error("Sintaxe inválida");
                const bObj = pilha.pop(); const aObj = pilha.pop();
                let b = bObj.val; const a = aObj.val;
                
                // Trata a adição de porcentagem: 50 + 10% -> 55
                if ((token.value === '+' || token.value === '-') && bObj.isPercent) {
                    b = a * b; // 'b' se torna a porcentagem baseada em 'a'
                }
                
                let isOpFrac = (aObj.isFrac || bObj.isFrac) && ['+', '-', '*', '/'].includes(token.value);
                
                if (token.value === '/' && !isOpFrac) {
                    if (b === 0) throw new Error("Indefinido");
                    resObj.val = fixEpsilon(a / b);
                    if (Number.isInteger(a) && Number.isInteger(b)) {
                        let div = mdc(a, b);
                        resObj.num = a / div; resObj.den = b / div; 
                        if (resObj.den < 0) { resObj.num *= -1; resObj.den *= -1; }
                        if (resObj.den === 1) {
                            resObj.isFrac = false; // Divisão exata, sem fração
                            explicacao = gerarExplicacaoDivisao(a, b);
                        } else {
                            resObj.isFrac = true;
                            explicacao = { passo: `Montando Fração`, isHtml: true, visual: `<div style="padding:10px; font-family:'Inter', sans-serif;">Fração interpretada: ${formatFrac(resObj.num, resObj.den)}</div>` };
                        }
                    } else {
                        resObj.num = resObj.val; resObj.isFrac = false;
                        explicacao = gerarExplicacaoDivisao(a, b);
                    }
                } 
                else if (isOpFrac) {
                    let f1 = aObj.isFrac ? aObj : { num: aObj.val, den: 1, isFrac: true };
                    let f2 = bObj.isFrac ? bObj : { num: b, den: 1, isFrac: true }; // Usamos o "b" tratado no caso da porcentagem
                    let opFrac = token.value;
                    if (opFrac === '/' && f2.num === 0) throw new Error("Indefinido");
                    
                    let info = gerarExplicacaoFracao(f1, f2, opFrac);
                    explicacao = info;
                    resObj.val = fixEpsilon(info.resN / info.resD); resObj.num = info.resN; resObj.den = info.resD; resObj.isFrac = true;
                    if (resObj.den === 1) resObj.isFrac = false;
                }
                else {
                    switch(token.value) {
                        case '+': resObj.val = fixEpsilon(a + b); explicacao = gerarExplicacaoSoma(a, b); break;
                        case '-': resObj.val = fixEpsilon(a - b); explicacao = gerarExplicacaoSubtracao(a, b); break;
                        case '*': resObj.val = fixEpsilon(a * b); explicacao = gerarExplicacaoMultiplicacao(a, b); break;
                        case '/': if (b === 0) throw new Error("Indefinido"); resObj.val = fixEpsilon(a / b); explicacao = gerarExplicacaoDivisao(a, b); break;
                        case '^': resObj.val = fixEpsilon(Math.pow(a, b)); explicacao = gerarExplicacaoPotencia(a, b); break;
                    }
                    resObj.num = resObj.val; resObj.isFrac = false;
                }
            }
            logs.push({ type: 'header', content: explicacao.passo });
            if(explicacao.isHtml) { logs.push({ type: 'html', content: explicacao.visual }); } 
            else { logs.push({ type: 'visual', content: explicacao.visual }); }
            pilha.push(resObj);
        }
    });
    if (pilha.length !== 1) throw new Error("Malformada.");
    const resultadoFinal = pilha[0];
    if (!isFinite(resultadoFinal.val)) throw new Error("Número muito grande");
    
    let valStr = formatarNumero(resultadoFinal.val);
    let msgFinal = `Resultado Final: ${valStr}`;
    if (resultadoFinal.isFrac && resultadoFinal.den !== 1) {
        msgFinal = `<div style="display:flex; align-items:center; justify-content:center; gap: 10px;">Resultado Final: ${formatFrac(resultadoFinal.num, resultadoFinal.den)} <span style="font-family:'Inter',sans-serif; font-size:1.1rem; color:var(--text-muted);">≈ ${valStr}</span></div>`;
        logs.push({type: 'final-html', content: msgFinal});
    } else {
        logs.push({type: 'final', content: msgFinal});
    }
    return { result: resultadoFinal.val, logs: logs };
}

let calcLock = false;
function calcular() {
    if (calcLock) return;
    calcLock = true;
    setTimeout(() => calcLock = false, 300); // Anti-spam do botão '='

    // Guarda se o painel já estava aberto antes de resetar
    let estavaAberto = detalhesDiv.style.display === "block";
    
    ultimosPassos = []; detalhesDiv.innerHTML = ""; detalhesDiv.style.display = "none";
    if (!expressao) { displayValue.textContent = "0"; return; }
    
    let exprParaCalc = expressao;

    if (/!{2,}/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Fatorial duplicado inválido" });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }

    if (/^\(\s*\)$/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Expressão vazia" });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }
    
    if (/[+\-×÷^/]$/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "A expressão não pode terminar com um operador." });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }
    
    const abertos = (exprParaCalc.match(/\(/g) || []).length; 
    const fechados = (exprParaCalc.match(/\)/g) || []).length;
    if (abertos !== fechados) {
        displayValue.textContent = "Erro"; displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Parênteses desbalanceados. Feche todos os parênteses antes de calcular." });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }

    try {
        const tokens = tokenize(exprParaCalc); const rpn = toRPN(tokens);
        ultimosPassos.push({ type: 'intro', content: `Analisando: ${escapeHTML(exprParaCalc)}` });
        const { result, logs } = evalRPNwithSteps(rpn);
        ultimosPassos = ultimosPassos.concat(logs);
        let resultadoFormatado = formatarNumero(result);
        displayValue.textContent = resultadoFormatado; displayValue.classList.remove("erro");
        salvarHistorico(expressao, resultadoFormatado, ultimosPassos);
    } catch (error) {
        displayValue.textContent = "Erro"; displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: error.message });
    }
    
    // Só reabre automaticamente se já estivesse aberto antes
    if (estavaAberto) mostrarDetalhes();
}

function salvarHistorico(expr, res, passos) {
    historico.unshift({ id: Date.now(), expressao: expr, resultado: res, passos: passos });
    if (historico.length > 50) historico.pop();
    localStorage.setItem("calcHistorico", JSON.stringify(historico));
}

historicoBtn.addEventListener("click", () => {
    detalhesDiv.style.display = "none";
    if (historicoDiv.style.display !== "block") {
        historicoDiv.style.display = "block"; historicoDiv.innerHTML = "";
        if (historico.length) {
            historico.forEach(reg => {
                const itemDiv = document.createElement("div");
                itemDiv.innerHTML = `<small>${escapeHTML(reg.expressao)}</small> = ${escapeHTML(String(reg.resultado))}`;
                itemDiv.onclick = () => carregarDoHistorico(reg.id);
                historicoDiv.appendChild(itemDiv);
            });
        } else { historicoDiv.innerHTML = "Nenhum cálculo no histórico."; }
    } else { historicoDiv.style.display = "none"; }
});

function carregarDoHistorico(id) {
    const registro = historico.find(h => h.id === id); if (!registro) return;
    expressao = registro.expressao; displayExpr.innerHTML = formatarParaDisplay(expressao);
    displayValue.textContent = registro.resultado; displayValue.classList.remove("erro");
    ultimosPassos = registro.passos; historicoDiv.style.display = "none"; mostrarDetalhes();
}

detalhesBtn.addEventListener("click", mostrarDetalhes);

function mostrarDetalhes() {
    historicoDiv.style.display = "none";
    if (detalhesDiv.style.display !== "block") {
        detalhesDiv.style.display = "block"; let html = '';
        if (ultimosPassos.length) {
            ultimosPassos.forEach(passo => {
                if(passo.type === 'intro') html += `<pre class="info">${passo.content}</pre>`;
                if(passo.type === 'visual') html += `<pre class="info">${passo.content}</pre>`;
                if(passo.type === 'html') html += passo.content;
                if(passo.type === 'header') html += `<h3>${passo.content}</h3>`;
                if(passo.type === 'final') html += `<pre class="info resultado-final">${passo.content}</pre>`;
                if(passo.type === 'final-html') html += `<div class="info resultado-final" style="padding:15px; font-family:'Inter', sans-serif;">${passo.content}</div>`;
                if(passo.type === 'error') html += `<pre class="info erro-didatico">⚠️ ${passo.content}</pre>`;
            });
        } else { html = "<pre class='info'>Faça um cálculo para ver os detalhes.</pre>"; }
        detalhesDiv.innerHTML = html;
    } else { detalhesDiv.style.display = "none"; }
}

atualizarDisplay(); 

document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        if (navigator.vibrate) navigator.vibrate(40); // Feedback táctil leve
    });
});

document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (/[0-9\,\.\+\-\*\/\(\)\%\^!]/.test(key)) {
        e.preventDefault();
        let val = key;
        if (val === '.') val = ','; // Converte ponto do teclado numérico para vírgula
        if (val === '*') val = '×';
        if (val === '/') val = '÷';
        if (val === '-') val = '−';
        adicionarInput(val);
    } else if (key === 'Enter' || key === '=') { e.preventDefault(); calcular(); } 
    else if (key === 'Backspace') { e.preventDefault(); apagarUltimo(); } 
    else if (key === 'Escape') { e.preventDefault(); limparTudo(); }
});

let touchStartX = 0;
const displayEl = document.querySelector('.display');
displayEl.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
displayEl.addEventListener('touchend', e => {
    if (e.changedTouches[0].screenX < touchStartX - 40) { // Swipe pra esquerda
        apagarUltimo();
        if (navigator.vibrate) navigator.vibrate(40);
    }
}, {passive: true});
</script>
