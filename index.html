<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Didática</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-page: #0d0d0f;
    --bg-calc: #16161a;
    --bg-display: #09090b;
    --text-main: #ededed;
    --text-muted: #a1a1aa;
    --accent-color: #6366f1;
    --accent-hover: #4f46e5;
    --btn-bg: #27272a;
    --btn-hover: #3f3f46;
    --btn-op: #1e1e24;
    --btn-op-text: #6366f1;
    --error-color: #ef4444;
    --success-color: #10b981;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-page);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    gap: 25px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 30px 10px;
    box-sizing: border-box;
  }

  .calculadora {
    background: var(--bg-calc);
    border-radius: 24px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .topo-controles {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    gap: 10px;
  }
  .btn-topo {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 8px 0;
    border-radius: 10px;
    background: var(--btn-bg);
    color: var(--text-muted);
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.2s;
  }
  .btn-topo:hover {
    background: var(--btn-hover);
    color: var(--text-main);
  }
  
  .display {
    background: var(--bg-display);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    text-align: right;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.02);
  }
  .display-expr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--text-muted);
    min-height: 24px;
    overflow-x: auto;
    white-space: nowrap;
    margin-bottom: 8px;
  }
  .display-value {
    font-family: 'Inter', sans-serif;
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: -1px;
    min-height: 60px;
    overflow-x: auto;
    white-space: nowrap;
    color: #fff;
    scrollbar-width: none;
  }
  .display-value::-webkit-scrollbar { display: none; }
  .display-value.erro { color: var(--error-color); font-size: 2rem;}

  .botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  
  .botoes.letras-grid {
    grid-template-columns: repeat(6, 1fr);
  }
  
  button.tecla {
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    padding: 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--text-main);
    transition: all 0.15s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  .botoes.letras-grid button.tecla {
    padding: 12px 6px;
    font-size: 1rem;
  }
  
  button.tecla:active { transform: scale(0.92); }
  button.tecla:hover { background: var(--btn-hover); }
  
  button.tecla.operador { 
    background: var(--btn-op); 
    color: var(--btn-op-text); 
    font-size: 1.4rem; 
  }
  button.tecla.operador:hover { background: #2a2a35; }
  
  button.tecla.acao { color: var(--error-color); font-weight: 600;}
  
  button.tecla.igual { 
    background: var(--accent-color); 
    color: white; 
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }
  button.tecla.igual:hover { background: var(--accent-hover); }

  #btnZero, #btnZeroCientifico { grid-column: 1 / 3; }

  #historico, #detalhes {
    display: none;
    background: var(--bg-display);
    color: var(--text-main);
    padding: 20px;
    margin-top: 20px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  #historico div {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
  }
  #historico div:hover { background-color: var(--btn-bg); }
  #historico div small { display: block; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px;}

  #detalhes .math-step {
    background-color: var(--bg-calc);
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  #detalhes h3 { 
    font-size: 1rem; 
    color: var(--accent-color); 
    margin-top: 0; 
    margin-bottom: 12px; 
    font-weight: 600;
  }
  #detalhes pre.info {
    font-family: 'JetBrains Mono', monospace;
    background-color: var(--bg-display);
    padding: 12px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 0.95rem;
    color: var(--text-muted);
  }
  .resultado-final { font-weight: 600; color: var(--success-color) !important; font-size: 1.1rem; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2) !important; background: rgba(16, 185, 129, 0.05) !important;}
  .erro-didatico { color: var(--error-color) !important; border: 1px solid rgba(239, 68, 68, 0.2) !important; background: rgba(239, 68, 68, 0.05) !important; }
  
  .conta-visual {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-display);
    padding: 20px;
    border-radius: 10px;
    margin: 10px 0;
    font-size: 1.2rem;
    overflow-x: auto;
    white-space: nowrap;
    display: inline-block;
    min-width: 90%;
    border: 1px solid rgba(255,255,255,0.02);
  }
  .divisao-grid { display: flex; flex-direction: column; }
  .div-linha { display: flex; }
  .div-bloco { padding: 0 5px; text-align: right; letter-spacing: 2px;}
  .div-chave { border-left: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); padding: 0 8px; margin-left: 5px;}
  
  .corte-strike { position: relative; display: inline-block; }
  .corte-strike::after { content: ''; position: absolute; left: -2px; top: 50%; width: 120%; height: 2px; background: var(--error-color); transform: rotate(-25deg); }
  .linha-traco { border-bottom: 2px solid var(--text-muted); width: 100%; margin: 8px 0; }

  .bloco-termo { display: inline-block; position: relative; }
  
  .potencia {
    font-size: 0.65em;
    position: relative;
    top: -0.8em;
    color: var(--accent-color);
    font-weight: 600;
    display: inline-block;
  }

  .fracao {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    text-align: center;
    padding: 0 4px;
  }
  .fracao-num { border-bottom: 1.5px solid currentColor; padding: 0 2px; line-height: 1.2; }
  .fracao-den { padding: 0 2px; line-height: 1.2; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-display); border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--btn-hover); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @media (max-width: 500px) {
    body {
      padding: 15px 10px;
      justify-content: flex-start;
      align-items: center;
    }
    .calculadora {
      padding: 18px;
      border-radius: 20px;
    }
    .display {

    }
    .display-value {
      font-size: 2.4rem;
      min-height: 50px;
    }
    .botoes {
      gap: 8px;
    }
    button.tecla {
      padding: 14px 8px;
      font-size: 1.15rem;
      border-radius: 10px;
    }
    button.tecla.operador {
      font-size: 1.25rem;
    }
  }

  .ads-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 480px;
    width: 100%;
    margin: 20px auto;
  }
  .ads-lateral {
    position: fixed;
    top: 50%;

    width: 120px;
    height: 600px;
    z-index: 0;
  }
  .ads-lateral.left { left: 10px; }
  .ads-lateral.right { right: 10px; }
  @media (max-width: 900px) {
    .ads-lateral { display: none; }
  }
</style>

<script>
const displayExpr = document.getElementById("displayExpr");
const displayValue = document.getElementById("displayValue");
const historicoDiv = document.getElementById("historico");
const detalhesDiv = document.getElementById("detalhes");
const historicoBtn = document.getElementById("historicoBtn");
const detalhesBtn = document.getElementById("detalhesBtn");
const btnShift = document.getElementById("btnShift");

const btnSecond = document.getElementById("btnSecond");
const btnDeg = document.getElementById("btnDeg");
const btnSin = document.getElementById("btnSin");
const btnCos = document.getElementById("btnCos");
const btnTan = document.getElementById("btnTan");
const btnLg = document.getElementById("btnLg");
const btnLn = document.getElementById("btnLn");

let expressao = "";
let ultimosPassos = [];
let historico = JSON.parse(localStorage.getItem("calcHistorico")) || [];
let estado = { modeDeg: true, secondState: false, shiftAtivo: false };

function fixEpsilon(val) {
    if (!isFinite(val) || Math.abs(val) > 1e15) return val;
    return parseFloat(val.toPrecision(14));
}

function formatarNumero(n) {
    if (!isFinite(n)) return String(n);
    if (Math.abs(n) >= 1e20) return n.toExponential(10).replace('.', ',');
    return new Intl.NumberFormat('pt-BR', {
        maximumFractionDigits: 10,
        minimumFractionDigits: 0
    }).format(n);
}

function mdc(a, b) {
    a = Math.abs(Math.round(a)); 
    b = Math.abs(Math.round(b));
    if (isNaN(a) || isNaN(b)) return 1;
    while (b !== 0) {
        let temp = b;
        b = a % b;
        a = temp;
    }
    return a || 1;
}

function formatFrac(n, d) {
    return `<div class="fracao">
        <span class="fracao-num">${n}</span>
        <span>${d}</span>
    </div>`;
}

function gerarExplicacaoFracao(f1, f2, op) {
    let n1 = f1.num, d1 = f1.den;
    let n2 = f2.num, d2 = f2.den;
    let resN, resD;

    switch(op) {
        case '+': resN = n1*d2 + n2*d1; resD = d1*d2; break;
        case '-': resN = n1*d2 - n2*d1; resD = d1*d2; break;
        case '*': resN = n1*n2; resD = d1*d2; break;
        case '/': resN = n1*d2; resD = d1*n2; break;
    }

    let divisor = mdc(resN, resD);
    resN /= divisor;
    resD /= divisor;

    return {
        passo: `Operação com frações`,
        isHtml: true,
        visual: `
        <div style="padding:10px; font-family:'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.2rem;">
            ${formatFrac(n1,d1)} ${op} ${formatFrac(n2,d2)} = ${formatFrac(resN,resD)}
        </div>
        `,
        resN, resD
    };
}

function createCharBlock(baseChar, supChar = ' ', isStrike = false) {
    let baseStyles = "position:relative; display:inline-block; width:1ch; text-align:center;";
    let supHtml = '';
    if (supChar !== ' ') {
        supHtml = `<span style="position:absolute; bottom:90%; left:0; right:0; margin:auto; text-align:center; color:var(--accent-color); font-weight:600; font-size:0.85em; line-height:1;">${supChar}</span>`;
    }
    let baseSpan = isStrike ? `<span class="corte-strike">${baseChar}</span>` : baseChar;
    return `<span style="${baseStyles}">${supHtml}${baseSpan}</span>`;
}

function gerarExplicacaoSoma(a, b) {
    // Prevenção de loop excessivo de strings e quebra por notação científica
    if (!isFinite(a) || !isFinite(b) || Math.abs(a) > 1e14 || Math.abs(b) > 1e14 || String(a).includes('e') || String(b).includes('e')) {
        return {passo: `Calculando ${a} + ${b}`, isHtml: false, visual: `Soma direta:\n${a} + ${b} = ${a+b}`};
    }

    // Se houver números negativos (ex: somar com uma dívida), usamos um fallback seguro
    if (a < 0 || b < 0) {
        return {passo: `Calculando ${a} + ${b}`, isHtml: true, visual: `<div class="conta-visual" style="font-size:1.3rem; padding: 20px;">${a} + (${b}) = <span style="color: var(--success-color);">${a+b}</span></div>`};
    }

    let sA = String(a), sB = String(b);
    let decA = sA.includes('.') ? sA.split('.')[1].length : 0;
    let decB = sB.includes('.') ? sB.split('.')[1].length : 0;
    const maxDec = Math.max(decA, decB);
    
    sA = a.toFixed(maxDec); sB = b.toFixed(maxDec);
    let resStr = (a + b).toFixed(maxDec);

    const maxLength = Math.max(sA.length, sB.length, resStr.length);
    sA = sA.padStart(maxLength, ' '); sB = sB.padStart(maxLength, ' ');
    resStr = resStr.padStart(maxLength, ' ');
    
    let carriesArr = Array(maxLength).fill(' ');
    let carry = 0;
    for (let i = maxLength - 1; i >= 0; i--) {
        if (sA[i] === '.') continue;
        let dA = sA[i] === ' ' ? 0 : parseInt(sA[i]);
        let dB = sB[i] === ' ' ? 0 : parseInt(sB[i]);
        let sum = dA + dB + carry;
        carry = Math.floor(sum / 10);
        if (carry > 0) {
            let prevJ = i - 1;
            while(prevJ >= 0 && sA[prevJ] === '.') prevJ--;
            if (prevJ >= 0) carriesArr[prevJ] = carry;
        }
    }
    
    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    let sAHtml = "";
    for(let i=0; i<maxLength; i++) {
        let topVal = carriesArr[i];
        sAHtml += createCharBlock(sA[i], topVal);
    }
    
    const offsetEsq = 2;
    linhas.push(sp(offsetEsq) + sAHtml);
    linhas.push("+ " + sB);
    linhas.push("-".repeat(maxLength + offsetEsq));
    linhas.push(sp(offsetEsq) + `<span style="color: var(--success-color);">${resStr}</span>`);
    
    let html = `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">\n${linhas.join('\n')}\n</div>`;
    
    return {passo: `Calculando ${a} + ${b}`, isHtml: true, visual: html};
}

function gerarExplicacaoSubtracao(a, b) {
    if (!isFinite(a) || !isFinite(b) || Math.abs(a) > 1e14 || Math.abs(b) > 1e14 || String(a).includes('e') || String(b).includes('e')) {
        return {passo: `Calculando ${a} - ${b}`, isHtml: false, visual: `Subtração direta:\n${a} - ${b} = ${a-b}`};
    }

    let negativo = false;
    if (b > a) { let temp = a; a = b; b = temp; negativo = true; }

    let sA = String(a), sB = String(b);
    let decA = sA.includes('.') ? sA.split('.')[1].length : 0;
    let decB = sB.includes('.') ? sB.split('.')[1].length : 0;
    const maxDec = Math.max(decA, decB);
    
    sA = a.toFixed(maxDec).replace('.', '');
    sB = b.toFixed(maxDec).replace('.', '').padStart(sA.length, '0');
    
    let numA = sA.split('').map(Number);
    let numB = sB.split('').map(Number);
    
    let cortes = Array(numA.length).fill(false);
    let emCima = Array(numA.length).fill('&nbsp;');
    let resultado = [];
    
    for (let i = numA.length - 1; i >= 0; i--) {
        if (numA[i] < numB[i]) {
            let vizinho = i - 1;
            while (vizinho >= 0 && numA[vizinho] === 0) {
                numA[vizinho] = 9; cortes[vizinho] = true; emCima[vizinho] = '9';
                vizinho--;
            }
            if (vizinho >= 0) {
                numA[vizinho] -= 1; cortes[vizinho] = true; emCima[vizinho] = String(numA[vizinho]);
                emCima[i] = '1'; numA[i] += 10;
            }
        }
        resultado.unshift(numA[i] - numB[i]);
    }

    let origA = a.toFixed(maxDec).split('');
    let posPonto = origA.indexOf('.');
    
    let html = `<div class="conta-visual sub-grid">`;
    html += `<div class="sub-num">`;
    let offset = 0;
    for(let i=0; i<origA.length; i++) {
        if(origA[i] === '.') { html += `.`; offset++; continue; }
        let topVal = emCima[i-offset];
        let supHtml = (topVal !== '&nbsp;' && topVal !== ' ') ? `<sup style="position:absolute; top:-12px; left:-2px; color:var(--accent-color); font-size:0.85rem; font-family:'Inter', sans-serif; font-weight:600;">${topVal}</sup>` : '';
        if(cortes[i-offset]) {
             html += `<span class="corte-strike" style="position:relative; width:16px; text-align:center; display:inline-block;">${supHtml}${origA[i]}</span>`;
        } else {
             html += `<span style="position:relative; width:16px; text-align:center; display:inline-block;">${supHtml}${origA[i]}</span>`;
        }
    }
    html += `</div><div class="sub-num">- ${b.toFixed(maxDec).padStart(origA.length, ' ').replace(/ /g, '&nbsp;')}</div>`;
    html += `<div class="linha-traco"></div>`;
    let resStr = (a - b).toFixed(maxDec).padStart(origA.length, ' ').replace(/ /g, '&nbsp;');
    html += `<div class="sub-num" style="color: var(--success-color);">${negativo ? '-' : '&nbsp;'}${resStr}</div></div>`;

    return {passo: `Calculando ${negativo ? b : a} - ${negativo ? a : b}`, isHtml: true, visual: html};
}

function gerarExplicacaoMultiplicacao(a, b) {
    if (!isFinite(a) || !isFinite(b) || Math.abs(a) > 1e14 || Math.abs(b) > 1e14) {
        return {passo: `Calculando ${a} × ${b}`, isHtml: false, visual: `Multiplicação direta:\n${a} × ${b} = ${a*b}`};
    }

    let absA = Math.abs(a);
    let absB = Math.abs(b);
    let isNeg = (a < 0) !== (b < 0) && (a !== 0 && b !== 0);
    
    let sA = String(absA);
    let sB = String(absB);
    
    // Se os números forem minúsculos/enormes e o JS usar notação científica (ex: 1e-10), fazemos fallback visual seguro
    if (sA.includes('e') || sB.includes('e')) {
        return {passo: `Calculando ${a} × ${b}`, isHtml: false, visual: `Multiplicação direta:\n${a} × ${b} = ${a*b}`};
    }
    
    let resNative = String(absA * absB);
    const cleanB = sB.replace('.', '');
    
    const width = Math.max(sA.length + 2, sB.length + 2, resNative.length + (isNeg ? 1 : 0));
    let intermediarios = [];
    
    let bIndex = 0;
    for (let i = sB.length - 1; i >= 0; i--) {
        if (sB[i] === '.') continue;
        const d2 = parseInt(sB[i]); 
        let parcial = '', carry = 0; 
        let carriesArr = Array(sA.length).fill(' ');
        
        for (let j = sA.length - 1; j >= 0; j--) {
            if (sA[j] === '.') continue;
            const produto = (parseInt(sA[j]) * d2) + carry;
            parcial = (produto % 10) + parcial; 
            carry = Math.floor(produto / 10);
            if (carry > 0) {
                let prevJ = j - 1;
                while(prevJ >= 0 && sA[prevJ] === '.') prevJ--;
                if (prevJ >= 0) carriesArr[prevJ] = carry;
            }
        }
        if (carry > 0) parcial = carry + parcial;
        
        intermediarios.push({ carries: carriesArr.join(''), produto: parcial + ' '.repeat(bIndex) });
        bIndex++;
    }
    
    const firstCarryLine = intermediarios.length > 0 ? intermediarios[0].carries : '';
    
    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    
    let sAHtml = sp(width - sA.length);
    for(let i=0; i<sA.length; i++) {
        let topVal = firstCarryLine[i] || ' ';
        let supHtml = (topVal !== ' ') ? `<sup style="position:absolute; top:-12px; left:-2px; color:var(--accent-color); font-size:0.85rem; font-family:'Inter', sans-serif; font-weight:600;">${topVal}</sup>` : '';
        sAHtml += `<span style="position:relative; display:inline-block;">${supHtml}${sA[i]}</span>`;
    }
    linhas.push(sAHtml);
    
    linhas.push(sp(width - sB.length - 2) + "× " + sB);
    linhas.push("-".repeat(width));
    
    if (cleanB.length > 1) {
        intermediarios.forEach(item => { linhas.push(sp(width - item.produto.length) + item.produto); });
        linhas.push("-".repeat(width));
    }
    
    let finalStr = isNeg ? '-' + resNative : resNative;
    linhas.push(sp(width - finalStr.length) + finalStr);
    
    let html = `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">\n${linhas.join('\n')}\n</div>`;
    
    return {passo: `Calculando ${a} × ${b}`, isHtml: true, visual: html};
}

function gerarExplicacaoDivisao(dividendo, divisor) {
    if (divisor === 0) return {passo: "Erro", isHtml: false, visual: "Divisão por zero inválida"};
    
    if (!isFinite(dividendo) || !isFinite(divisor) || Math.abs(dividendo) > 1e14 || Math.abs(divisor) > 1e14 || String(dividendo).includes('e') || String(divisor).includes('e')) {
        return {passo: `Calculando ${dividendo} ÷ ${divisor}`, isHtml: false, visual: `Divisão direta:\n${dividendo} ÷ ${divisor} = ${dividendo/divisor}`};
    }
    
    let html = `<div style="display:flex; justify-content:center; margin-bottom: 15px; font-family:'Inter', sans-serif; align-items: center; gap: 10px;">
        <div class="fracao" style="font-size: 1.5rem; color: var(--accent-color); font-weight: 500;">
            <span class="fracao-num">${dividendo}</span>
            <span>${divisor}</span>
        </div>
        <span style="color: var(--text-muted); font-size: 1.2rem;">=</span>
    </div>`;

    let d1 = String(dividendo);
    let d2 = String(divisor);
    let dec1 = d1.includes('.') ? d1.split('.')[1].length : 0;
    let dec2 = d2.includes('.') ? d2.split('.')[1].length : 0;
    let maxDec = Math.max(dec1, dec2);
    let divInt = Math.round(dividendo * Math.pow(10, maxDec));
    let divisorInt = Math.round(divisor * Math.pow(10, maxDec));

    let dStr = String(divInt);
    let maxCasas = 5;

    let qStr = "";
    let valorAtualStr = "";
    let pos = 0;
    let decimalAdicionado = false;
    let restosVistos = new Map();

    let passosSubtracao = [];
    
    let iteracoes = 0;
    const MAX_ITER = 50;

    while (pos < dStr.length || (parseInt(valorAtualStr||"0") !== 0 && qStr.replace('.','').length < maxCasas + 2)) {
        iteracoes++;
        if (iteracoes > MAX_ITER) break;
        
        if (pos < dStr.length) {
            valorAtualStr += dStr[pos];
            pos++;
        } else {
            if (!decimalAdicionado) {
                if (qStr === "") qStr = "0";
                qStr += ".";
                decimalAdicionado = true;
            }
            valorAtualStr += "0";
            pos++;

            let estado = valorAtualStr;
            if (restosVistos.has(estado)) {
                qStr += "...";
                break;
            }
            restosVistos.set(estado, true);
        }

        let valorAtual = parseInt(valorAtualStr, 10);

        if (valorAtual < divisorInt) {
            if (qStr !== "" && qStr !== "0.") qStr += "0";
            else if (pos === dStr.length && qStr === "") qStr += "0";
            continue;
        }

        let q = Math.floor(valorAtual / divisorInt);
        qStr += String(q);
        let sub = q * divisorInt;
        let novoResto = valorAtual - sub;

        passosSubtracao.push({ minuendo: valorAtual, subtraendo: sub, resto: novoResto, posFinal: pos });

        valorAtualStr = String(novoResto);
        if (novoResto === 0 && pos >= dStr.length) break;
    }
    if (qStr === "") qStr = "0";
    if (qStr.endsWith('.')) qStr = qStr.slice(0, -1);

    let linhas = [];
    const sp = (n) => " ".repeat(Math.max(0, n));
    const offsetEsq = 2;

    let chave1 = ` | <span style="color:var(--text-main)">${divisorInt}</span>`;
    // CORREÇÃO: Aqui estava o +<span... Agora é apenas um traço -<span... para formar a chave perfeitamente reta.
    let chave2 = ` -<span style="color:var(--text-muted)">${"-".repeat(Math.max(String(divisorInt).length, qStr.length))}</span>`;
    let chave3 = ` | <span style="color:var(--success-color)">${qStr}</span>`;

    linhas.push(sp(offsetEsq) + dStr + chave1);
    linhas.push(sp(offsetEsq + dStr.length) + chave2);
    linhas.push(sp(offsetEsq + dStr.length) + chave3);

    for (let k = 0; k < passosSubtracao.length; k++) {
        let passo = passosSubtracao[k];
        let sA = String(passo.minuendo);
        let sB = String(passo.subtraendo).padStart(sA.length, '0');
        let numA = sA.split('').map(Number);
        let numB = sB.split('').map(Number);
        let cortes = Array(numA.length).fill(false);
        let emCima = Array(numA.length).fill(' ');
        let teveCorte = false;

        for (let i = numA.length - 1; i >= 0; i--) {
            if (numA[i] < numB[i]) {
                teveCorte = true;
                let vizinho = i - 1;
                while (vizinho >= 0 && numA[vizinho] === 0) {
                    numA[vizinho] = 9; cortes[vizinho] = true; emCima[vizinho] = '9';
                    vizinho--;
                }
                if (vizinho >= 0) {
                    numA[vizinho] -= 1; cortes[vizinho] = true; emCima[vizinho] = String(numA[vizinho]);
                    emCima[i] = '1'; numA[i] += 10;
                }
            }
        }

        let startIdx = passo.posFinal - sA.length;

        let minHtml = sp(offsetEsq + startIdx);
        for(let i=0; i<sA.length; i++) {
            let topVal = emCima[i];
            let isStrike = cortes[i];
            minHtml += createCharBlock(sA[i], topVal, isStrike);
        }
        linhas.push(minHtml);

        let subStr = String(passo.subtraendo);
        let padSub = passo.posFinal - subStr.length;
        linhas.push(`<span style="color:var(--error-color)">${sp(offsetEsq + padSub - 1)}-${subStr}</span>`);

        let tracoLen = sA.length;
        linhas.push(sp(offsetEsq + startIdx) + `<span style="color:var(--text-muted)">${"-".repeat(tracoLen)}</span>`);
    }

    if (passosSubtracao.length > 0) {
        let ultimoPasso = passosSubtracao[passosSubtracao.length - 1];
        let restoStr = String(ultimoPasso.resto);
        let startIdx = ultimoPasso.posFinal - restoStr.length;
        linhas.push(sp(offsetEsq + startIdx) + `<span style="color:var(--text-main)">${restoStr}</span>`);
    } else {
        linhas.push(sp(offsetEsq + dStr.length - 1) + `<span style="color:var(--text-main)">0</span>`);
    }

    html += `<div class="conta-visual" style="white-space: pre; line-height: 1.4; overflow-x: auto; font-size: 1.3rem; padding-top: 1.5em;">`;
    html += linhas.join("\n");
    html += `</div>`;

    return {passo: `Calculando ${dividendo} ÷ ${divisor}`, isHtml: true, visual: html};
}

function gerarExplicacaoPorcentagem(n) {
    const divInfo = gerarExplicacaoDivisao(n, 100);
    return { passo: `Divisão (porcentagem)`, isHtml: true, visual: `<div style="margin-bottom:10px; font-family:'Inter',sans-serif; color: var(--text-muted);"><strong>${n}% = ${n} ÷ 100</strong></div>${divInfo.visual}` };
}

function gerarExplicacaoRaizQuadrada(n) {
    const resultado = Math.sqrt(n);
    if (Number.isInteger(resultado)) {
        const prova = gerarExplicacaoMultiplicacao(resultado, resultado);
        return { passo: `Calculando √${n}`, isHtml: false, visual: `A raiz quadrada de ${n} é ${resultado}, pois ${resultado} × ${resultado} = ${n}.\n\nProva da multiplicação:\n${prova.visual}` };
    } else {
        return { passo: `Calculando √${n}`, isHtml: false, visual: `A raiz quadrada de ${n} não é um número inteiro.\nResultado aproximado: ${resultado}` };
    }
}

function gerarExplicacaoPotencia(base, expoente) {
    let html = `<div style="font-family:'Inter',sans-serif; color:var(--text-muted); margin-bottom:10px;">Para calcular <strong style="color:var(--accent-color); font-size:1.2em;">${base}<span style="vertical-align: super; font-size: 0.7em;">${expoente}</span></strong>, multiplicamos ${base} por si mesmo, ${expoente} vezes.</div>`;
    if (expoente > 1 && expoente <= 10 && Number.isInteger(expoente)) {
        let calcTemp = base;
        for (let i = 1; i < expoente; i++) {
            html += `<div style="margin-top:15px; color:var(--text-main); font-family:'Inter',sans-serif;"><strong>Passo ${i}:</strong> ${calcTemp} × ${base}</div>`;
            html += `<div style="margin-top:5px; margin-bottom:10px;">${gerarExplicacaoMultiplicacao(calcTemp, base).visual}</div>`;
            calcTemp *= base;
        }
    } else { 
        html += `<div style="margin-top:15px; color:var(--text-main); font-family:'Inter',sans-serif;">Cálculo direto.<br>Valor da potência: ${Math.pow(base, expoente)}</div>`; 
    }
    return { passo: `Calculando potência`, isHtml: true, visual: html };
}

function gerarExplicacaoFatorial(n) {
    if (n < 0 || !Number.isInteger(n)) return {passo: "Erro", isHtml: false, visual: "Erro de Domínio (Fatorial só se aplica a inteiros positivos)."};
    if (n > 170) return {passo: "Erro", isHtml: false, visual: "Número muito grande para fatorial (limite: 170)."};
    if (n === 0 || n === 1) return {passo: `Calculando ${n}!`, isHtml: false, visual: `${n}! = 1`};
    let texto = `${n}! = ${n}`;
    let resultado = 1;
    for (let i = n - 1; i > 1; i--) { texto += ` × ${i}`; resultado *= i; }
    resultado *= n; texto += ` × 1\n`;
    if (n <= 8 && n >= 2) {
        texto += `\nPasso a passo das multiplicações:\n`;
        let calcTemp = n;
        for (let i = n - 1; i >= 2; i--) {
            texto += `\n--- Multiplicando por ${i} ---\n`;
            texto += gerarExplicacaoMultiplicacao(calcTemp, i).visual + `\n`;
            calcTemp *= i;
        }
    } else if (n > 8) {
        texto += `\n(Passo a passo visual omitido por ser muito longo)\nValor do fatorial: ${resultado}`;
    }
    return {passo: `Calculando ${n}!`, isHtml: false, visual: texto};
}

function gerarExplicacaoTrig(funcao, anguloRad, anguloOriginal, emDeg, resultadoFinal) {
    let texto = `Calculando ${funcao}(${anguloOriginal}${emDeg && ['sin', 'cos', 'tan'].includes(funcao) ? '°' : ' rad'}).\n`;
    if (emDeg && ['sin', 'cos', 'tan'].includes(funcao)) { 
        texto += `1. Convertendo graus para radianos:\n${anguloOriginal}° × (π / 180) = ${anguloRad} rad.\n\n`; 
    }
    if (emDeg && ['asin', 'acos', 'atan'].includes(funcao)) {
        let resRad = resultadoFinal * Math.PI / 180;
        texto += `Convertendo resultado para graus:\n${resRad} rad × (180 / π) = ${resultadoFinal}°.\n\n`;
    }
    texto += `Valor: ${resultadoFinal}`;
    return {passo: `Calculando ${funcao}(${anguloOriginal})`, isHtml: false, visual: texto};
}

function gerarExplicacaoLog(funcao, n) {
    let texto = `Calculando ${funcao}(${n}).\n`;
    texto += funcao === 'lg' ? `Procuramos 'x' tal que 10^x = ${n}.\n` : `Procuramos 'x' tal que e^x = ${n}.\n`;
    texto += `Valor: ${funcao === 'lg' ? Math.log10(n) : Math.log(n)}`;
    return {passo: `Calculando ${funcao}(${n})`, isHtml: false, visual: texto};
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
}

function formatarParaDisplay(expr) {
    if (!expr) return "";
    
    let text = expr.replace(/\d+(,\d+)?/g, match => {
        let parts = match.split(',');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.join(',');
    });

    let htmlPlaceholders = [];
    const letras = 'a-zA-ZΔθλμΩπe';
    const tokenPattern = `(?:[${letras}]*\\x01\\d+\\x02|[${letras}]+|[\\d.,]+|\\x03\\d+\\x04)`;

    function processMath(s) {
        let prevSafe;
        const powerRegex = new RegExp(`(${tokenPattern})\\^(${tokenPattern})`, 'g');
        do {
            prevSafe = s;
            s = s.replace(powerRegex, (match, p1, p2) => {
                htmlPlaceholders.push(`<span class="bloco-termo">${p1}<span class="potencia">${p2}</span></span>`);
                return `\x03${htmlPlaceholders.length - 1}\x04`;
            });
        } while (s !== prevSafe);

        const fracRegex = new RegExp(`(${tokenPattern})\\/(${tokenPattern})`, 'g');
        do {
            prevSafe = s;
            s = s.replace(fracRegex, (match, p1, p2) => {
                htmlPlaceholders.push(`<span class="fracao"><span class="fracao-num">${p1}</span><span class="fracao-den">${p2}</span></span>`);
                return `\x03${htmlPlaceholders.length - 1}\x04`;
            });
        } while (s !== prevSafe);
        
        const fracIncRegex = new RegExp(`(${tokenPattern})\\/(?!\\d|\\x01|\\x03|[a-zA-Z])`, 'g');
        s = s.replace(fracIncRegex, (match, p1) => {
            htmlPlaceholders.push(`<span class="fracao"><span class="fracao-num">${p1}</span><span class="fracao-den">&nbsp;</span></span>`);
            return `\x03${htmlPlaceholders.length - 1}\x04`;
        });
        return s;
    }

    let placeholders = [];
    function extractAndProcessParens(str) {
        let prev;
        do {
            prev = str;
            str = str.replace(/\(([^()]+)\)/g, (match, inner) => {
                let processedInner = processMath(inner);
                placeholders.push(`(${processedInner})`);
                return `\x01${placeholders.length - 1}\x02`;
            });
        } while (str !== prev);
        return str;
    }
    
    let safeStr = extractAndProcessParens(text);
    safeStr = processMath(safeStr);

    let prevRestore;
    do {
        prevRestore = safeStr;
        safeStr = safeStr.replace(/\x03(\d+)\x04/g, (match, id) => htmlPlaceholders[id]);
        safeStr = safeStr.replace(/\x01(\d+)\x02/g, (match, id) => placeholders[id]);
    } while (safeStr !== prevRestore);

    return safeStr;
}

function atualizarDisplay() { displayExpr.innerHTML = formatarParaDisplay(expressao); displayValue.textContent = "0"; displayValue.classList.remove("erro"); }
function limparTudo() { expressao = ""; ultimosPassos = []; detalhesDiv.style.display = "none"; displayExpr.innerHTML = ""; displayValue.textContent = "0"; displayValue.classList.remove("erro"); }

function adicionarInput(valor) {
    if (expressao.length > 100) return;
    const ultimoChar = expressao.slice(-1);
    const operadores = "+−×÷^/";
    
    if (valor === ',') {
        const partes = expressao.split(/[\+\−\×\÷\^\(\)\/!√]/);
        if (partes[partes.length - 1].includes(',')) return;
    }
    
    if (operadores.includes(valor)) {
        if (operadores.includes(ultimoChar)) {
            if (valor === '−' && ultimoChar !== '−' && ultimoChar !== '+') {
                expressao += valor;
            } else {
                expressao = expressao.slice(0, -1) + valor;
            }
        } else if (ultimoChar === '(' && valor !== '−') {
            return;
        } else {
            expressao += valor;
        }
    } else {
        expressao += valor;
    }
    displayExpr.innerHTML = formatarParaDisplay(expressao);
}

const precedencia = { '+': 1, '-': 1, '*': 2, '/': 2, 'u-': 3, '^': 4, 'sqrt': 5, '!': 5, '%': 5 };
const associatividade = { '^': 'direita', '+': 'esquerda', '-': 'esquerda', '*': 'esquerda', '/': 'esquerda', 'u-': 'direita', '!': 'esquerda', '%': 'esquerda', 'sqrt': 'direita' };
const constantes = { 'pi': Math.PI, 'e': Math.E };

function tokenize(expr) {
    let calcExpr = expr.replace(/\./g, '').replace(/,/g, '.').replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-').replace(/π/g, 'pi').replace(/√/g, 'sqrt');
    
    calcExpr = calcExpr.replace(/(\d)(x|pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt|\()/ig, '$1*$2');
    calcExpr = calcExpr.replace(/(\))(x|pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt|\(|\d)/ig, '$1*$2');
    calcExpr = calcExpr.replace(/(x|pi|e)(\d|\()/ig, '$1*$2');

    const tokens = []; 
    const regex = /(\d+\.?\d*|\.\d+)|(pi|e|sin|cos|tan|asin|acos|atan|lg|ln|sqrt)|([xX])|([+\-*\/^()!,%])/ig;
    let match; 
    let ultimoTokenTipo = null;
    
    while ((match = regex.exec(calcExpr)) !== null) {
        const token = match[0];
        if (match[1]) { 
            tokens.push({ type: 'numero', value: parseFloat(token) }); 
            ultimoTokenTipo = 'numero'; 
        }
        else if (match[2]) {
            const tokenLower = token.toLowerCase();
            if (tokenLower === 'pi' || tokenLower === 'e') { 
                tokens.push({ type: 'numero', value: constantes[tokenLower] }); 
                ultimoTokenTipo = 'numero'; 
            }
            else { 
                tokens.push({ type: 'funcao', value: tokenLower }); 
                ultimoTokenTipo = 'funcao'; 
            }
        } else if (match[3]) {
            tokens.push({ type: 'variavel', value: 'x' });
            ultimoTokenTipo = 'variavel';
        } else if (match[4]) {
            if (token === '-' && (ultimoTokenTipo === null || ultimoTokenTipo === 'operador' || ultimoTokenTipo === 'paren_esq')) {
                tokens.push({ type: 'operador', value: 'u-' });
            } else { 
                tokens.push({ type: 'operador', value: token }); 
            }
            ultimoTokenTipo = (token === '(') ? 'paren_esq' : (token === ')') ? 'paren_dir' : 'operador';
        }
    }
    return tokens;
}

function toRPN(tokens) {
    const saida = []; 
    const operadores = [];
    
    tokens.forEach(token => {
        if (token.type === 'numero') saida.push(token);
        else if (token.type === 'funcao') operadores.push(token);
        else if (token.value === ',') {
            while (operadores.length > 0 && operadores[operadores.length - 1].value !== '(') saida.push(operadores.pop());
        } else if (token.type === 'operador') {
            if (token.value === '(') operadores.push(token);
            else if (token.value === ')') {
                while (operadores.length > 0 && operadores[operadores.length - 1].value !== '(') saida.push(operadores.pop());
                if (operadores.length === 0) throw new Error("Erro: Parênteses.");
                operadores.pop();
                if (operadores.length > 0 && operadores[operadores.length - 1].type === 'funcao') saida.push(operadores.pop());
            } else {
                const op1 = token.value;
                while (operadores.length > 0) {
                    const op2 = operadores[operadores.length - 1].value;
                    if (op2 === '(') break;
                    const p1 = precedencia[op1] || 0; 
                    const p2 = precedencia[op2] || 0; 
                    const a1 = associatividade[op1] || 'esquerda';
                    if ((a1 === 'esquerda' && p1 <= p2) || (a1 === 'direita' && p1 < p2)) saida.push(operadores.pop());
                    else break;
                }
                operadores.push(token);
            }
        }
    });
    
    while (operadores.length > 0) {
        const op = operadores.pop();
        if (op.value === '(') throw new Error("Erro: Parênteses.");
        saida.push(op);
    }
    return saida;
}

function evalRPNwithSteps(rpn) {
    const pilha = []; const logs = [];
    rpn.forEach(token => {
        if (token.type === 'numero') { 
            pilha.push({ val: token.value, num: token.value, den: 1, isFrac: false }); 
        } else {
            let explicacao;
            let resObj = { val: 0, num: 0, den: 1, isFrac: false };

            if (token.value === 'u-' || token.value === '!' || token.value === '%' || token.type === 'funcao') {
                if (pilha.length < 1) throw new Error("Sintaxe inválida");
                const aObj = pilha.pop(); const a = aObj.val;
                let resultado;
                switch(token.value) {
                    case 'u-': 
                        resultado = fixEpsilon(-a); 
                        if(aObj.isFrac) {
                            resObj.isFrac = true; resObj.num = -aObj.num; resObj.den = aObj.den;
                            explicacao = {passo: `Invertendo sinal da fração`, isHtml: true, visual: `<div style="padding:10px;">Fica: ${formatFrac(resObj.num, resObj.den)}</div>`}; 
                        } else { explicacao = {passo: `Invertendo sinal`, isHtml: false, visual: `Oposto de ${a}: ${-a}`}; }
                        break;
                    case '!':
                        if (a < 0 || !Number.isInteger(a)) throw new Error("Erro de Domínio (Fatorial)");
                        if (a > 170) throw new Error("Número muito grande");
                        resultado = 1; for (let i = 2; i <= a; i++) resultado *= i;
                        explicacao = gerarExplicacaoFatorial(a); break;
                    case '%': resultado = fixEpsilon(a / 100); explicacao = gerarExplicacaoPorcentagem(a); break;
                    case 'sqrt': if (a < 0) throw new Error("Erro de Domínio"); resultado = fixEpsilon(Math.sqrt(a)); explicacao = gerarExplicacaoRaizQuadrada(a); break;
                    case 'ln': if (a <= 0) throw new Error("Erro de Domínio"); resultado = Math.log(a); explicacao = gerarExplicacaoLog('ln', a); break;
                    case 'lg': if (a <= 0) throw new Error("Erro de Domínio"); resultado = Math.log10(a); explicacao = gerarExplicacaoLog('lg', a); break;
                    case 'sin': case 'cos': case 'tan':
                        let anguloRad = estado.modeDeg ? a * Math.PI / 180 : a;
                        if (token.value === 'tan' && Math.abs(Math.cos(anguloRad)) < 1e-12) throw new Error("Indefinido");
                        resultado = fixEpsilon(Math[token.value](anguloRad));
                        if (Math.abs(resultado) < 1e-14) resultado = 0;
                        explicacao = gerarExplicacaoTrig(token.value, anguloRad, a, estado.modeDeg, resultado); break;
                    case 'asin': case 'acos': case 'atan':
                        if (['asin', 'acos'].includes(token.value) && (a < -1 || a > 1)) throw new Error("Erro de Domínio");
                        resultado = fixEpsilon(Math[token.value](a));
                        if (estado.modeDeg) resultado = resultado * 180 / Math.PI;
                        if (Math.abs(resultado) < 1e-14) resultado = 0;
                        explicacao = gerarExplicacaoTrig(token.value, a, a, estado.modeDeg, resultado); break;
                }
                if (token.value !== 'u-') { resObj.val = resultado; resObj.num = resultado; resObj.den = 1; resObj.isFrac = false; }
                else { resObj.val = resultado; }
                
                if (token.value === '%') resObj.isPercent = true;
            } else {
                if (pilha.length < 2) throw new Error("Sintaxe inválida");
                const bObj = pilha.pop(); const aObj = pilha.pop();
                let b = bObj.val; const a = aObj.val;
                
                // Trata a adição de porcentagem: 50 + 10% -> 55
                if ((token.value === '+' || token.value === '-') && bObj.isPercent) {
                    b = a * b; // 'b' se torna a porcentagem baseada em 'a'
                }
                
                let isOpFrac = (aObj.isFrac || bObj.isFrac) && ['+', '-', '*', '/'].includes(token.value);
                
                if (token.value === '/' && !isOpFrac) {
                    if (b === 0) throw new Error("Divisão por zero");
                    resObj.val = fixEpsilon(a / b);
                    if (Number.isInteger(a) && Number.isInteger(b)) {
                        let div = mdc(a, b);
                        resObj.num = a / div; resObj.den = b / div; 
                        if (resObj.den < 0) { resObj.num *= -1; resObj.den *= -1; }
                        if (resObj.den === 1) {
                            resObj.isFrac = false; // Divisão exata, sem fração
                            explicacao = gerarExplicacaoDivisao(a, b);
                        } else {
                            resObj.isFrac = true;
                            explicacao = { passo: `Montando Fração`, isHtml: true, visual: `<div style="padding:10px; font-family:'Inter', sans-serif;">Fração interpretada: ${formatFrac(resObj.num, resObj.den)}</div>` };
                        }
                    } else {
                        resObj.num = resObj.val; resObj.isFrac = false;
                        explicacao = gerarExplicacaoDivisao(a, b);
                    }
                } 
                else if (isOpFrac) {
                    let f1 = aObj.isFrac ? aObj : { num: aObj.val, den: 1, isFrac: true };
                    let f2 = bObj.isFrac ? bObj : { num: b, den: 1, isFrac: true }; // Usamos o "b" tratado no caso da porcentagem
                    let opFrac = token.value;
                    if (opFrac === '/' && f2.num === 0) throw new Error("Divisão por zero");
                    
                    let info = gerarExplicacaoFracao(f1, f2, opFrac);
                    explicacao = info;
                    resObj.val = fixEpsilon(info.resN / info.resD); resObj.num = info.resN; resObj.den = info.resD; resObj.isFrac = true;
                    if (resObj.den === 1) resObj.isFrac = false;
                }
                else {
                    switch(token.value) {
                        case '+': resObj.val = fixEpsilon(a + b); explicacao = gerarExplicacaoSoma(a, b); break;
                        case '-': resObj.val = fixEpsilon(a - b); explicacao = gerarExplicacaoSubtracao(a, b); break;
                        case '*': resObj.val = fixEpsilon(a * b); explicacao = gerarExplicacaoMultiplicacao(a, b); break;
                        case '/': if (b === 0) throw new Error("Divisão por zero"); resObj.val = fixEpsilon(a / b); explicacao = gerarExplicacaoDivisao(a, b); break;
                        case '^': resObj.val = fixEpsilon(Math.pow(a, b)); explicacao = gerarExplicacaoPotencia(a, b); break;
                    }
                    resObj.num = resObj.val; resObj.isFrac = false;
                }
            }
            logs.push({ type: 'header', content: explicacao.passo });
            if(explicacao.isHtml) { logs.push({ type: 'html', content: explicacao.visual }); } 
            else { logs.push({ type: 'visual', content: explicacao.visual }); }
            pilha.push(resObj);
        }
    });
    if (pilha.length !== 1) throw new Error("Malformada.");
    const resultadoFinal = pilha[0];
    if (isNaN(resultadoFinal.val)) throw new Error("Resultado Indefinido (NaN)");
    if (!isFinite(resultadoFinal.val)) throw new Error("Número muito grande ou infinito");
    
    let valStr = formatarNumero(resultadoFinal.val);
    let msgFinal = `Resultado Final: ${valStr}`;
    if (resultadoFinal.isFrac && resultadoFinal.den !== 1) {
        msgFinal = `<div style="display:flex; align-items:center; justify-content:center; gap: 10px;">Resultado Final: ${formatFrac(resultadoFinal.num, resultadoFinal.den)} <span style="font-family:'Inter',sans-serif; font-size:1.1rem; color:var(--text-muted);">≈ ${valStr}</span></div>`;
        logs.push({type: 'final-html', content: msgFinal});
    } else {
        logs.push({type: 'final', content: msgFinal});
    }
    return { result: resultadoFinal.val, logs: logs };
}

// ===== MOTOR ALGÉBRICO (SEPARADO, NÃO TOCA EM TOKENIZE/TORPN/EVALRPN) =====

function multiplicarTermosStr(t1, t2, v) {
    const parseTermo = (t) => {
        let c = 1, e = 0;
        if (t.includes(v)) {
            if (t.includes(v + '^2') || t.includes(v + '²')) e = 2;
            else e = 1;
            
            let cStr = t.split(v)[0];
            if (cStr === '' || cStr === '+') c = 1;
            else if (cStr === '-') c = -1;
            else c = parseFloat(cStr);
        } else {
            c = parseFloat(t);
            e = 0;
        }
        return {c, e};
    };

    let p1 = parseTermo(t1);
    let p2 = parseTermo(t2);

    let cRes = p1.c * p2.c;
    let eRes = p1.e + p2.e;

    if (isNaN(cRes)) cRes = 0;
    if (cRes === 0) return '0';
    
    let varPart = '';
    if (eRes === 1) varPart = v;
    if (eRes === 2) varPart = v + '^2';
    if (eRes > 2) varPart = v + '^' + eRes;

    if (varPart === '') return cRes.toString();
    if (cRes === 1) return varPart;
    if (cRes === -1) return '-' + varPart;
    return cRes.toString() + varPart;
}

function expandirExpressao(expr) {
    if (!expr) return "";
    let processado = expr.replace(/\s+/g, '');
    
    // Inserir multiplicadores implícitos entre blocos: )( , \d(, x( , )x , )\d
    processado = processado.replace(/(\d)([a-zA-ZΔθλμΩ\(])/g, '$1*$2');
    processado = processado.replace(/([a-zA-ZΔθλμΩ])(\()/g, '$1*$2');
    processado = processado.replace(/(\))([a-zA-ZΔθλμΩ\d\(])/g, '$1*$2');

    let vMatch = processado.match(/[a-zA-ZΔθλμΩ]/);
    let v = vMatch ? vMatch[0] : 'x';

    let regexBinomio = /\(([^()]+)\)\*\(([^()]+)\)/g;
    let regexMonomio = new RegExp(`([\\d\\.\\-]+|(?:-)?${v}(?:\\^2|²)?)\\*\\(([^()]+)\\)`, 'g');
    let regexMonomioDir = new RegExp(`\\(([^()]+)\\)\\*([\\d\\.\\-]+|(?:-)?${v}(?:\\^2|²)?)`, 'g');

    let expandiu = true;
    let limit = 0; // Prevenção de loop infinito
    while(expandiu && limit < 10) {
        expandiu = false;
        limit++;

        processado = processado.replace(regexBinomio, (match, p1, p2) => {
            expandiu = true;
            let termos1 = p1.replace(/-/g, '+-').split('+').filter(t=>t);
            let termos2 = p2.replace(/-/g, '+-').split('+').filter(t=>t);
            let res = [];
            for(let t1 of termos1) {
                for(let t2 of termos2) { res.push(multiplicarTermosStr(t1, t2, v)); }
            }
            return '(' + res.join('+').replace(/\+\-/g, '-') + ')';
        });

        processado = processado.replace(regexMonomio, (match, m, p) => {
            expandiu = true;
            let termos = p.replace(/-/g, '+-').split('+').filter(t=>t);
            let res = termos.map(t => multiplicarTermosStr(m, t, v));
            return '(' + res.join('+').replace(/\+\-/g, '-') + ')';
        });

        processado = processado.replace(regexMonomioDir, (match, p, m) => {
            expandiu = true;
            let termos = p.replace(/-/g, '+-').split('+').filter(t=>t);
            let res = termos.map(t => multiplicarTermosStr(m, t, v));
            return '(' + res.join('+').replace(/\+\-/g, '-') + ')';
        });
    }

    // Limpar parênteses desnecessários e distribuir sinais negativos pendentes
    let last = "";
    while (last !== processado) {
        last = processado;
        processado = processado.replace(/-\(([^()]+)\)/g, (match, p) => {
            let termos = p.replace(/-/g, '+-').split('+').filter(t=>t);
            let res = termos.map(t => multiplicarTermosStr('-1', t, v));
            return '+' + res.join('+').replace(/\+\-/g, '-');
        });
        processado = processado.replace(/\+?\(([^()]+)\)/g, '+$1');
    }

    return processado.replace(/\+\+/g, '+').replace(/\+-/g, '-').replace(/-\+/g, '-').replace(/--/g, '+').replace(/^\+/, '');
}

function extrairCoeficientes(expr) {
    expr = expr.replace(/\s/g, '');
    expr = expr.replace(/-/g, '+-');

    let termos = expr.split('+');

    let a = 0; // x²
    let b = 0; // x
    let c = 0; // número

    let vMatch = expr.match(/[a-zA-ZΔθλμΩ]/);
    let varNome = vMatch ? vMatch[0] : 'x';

    termos.forEach(t => {
        if (!t) return;

        if (t.includes(varNome + '²') || t.includes(varNome + '^2')) {
            let coef = t.replace(varNome + '²', '').replace(varNome + '^2', '');
            if (coef === '' || coef === '+') coef = 1;
            if (coef === '-') coef = -1;
            a += parseFloat(coef);
        }
        else if (t.includes(varNome)) {
            let coef = t.replace(varNome, '');
            if (coef === '' || coef === '+') coef = 1;
            if (coef === '-') coef = -1;
            b += parseFloat(coef);
        }
        else {
            c += parseFloat(t);
        }
    });

    return { a, b, c, v: varNome };
}

function resolverEquacaoLinear(expr, exprOriginal = null) {
    const [left, right] = expr.split('=');

    const l = extrairCoeficientes(left);
    const r = extrairCoeficientes(right);
    
    let varNome = l.v !== 'x' ? l.v : r.v;

    let a = l.b;
    let b = l.c;
    let c = r.b;
    let d = r.c;

    let passos = [];

    passos.push({ type: 'header', content: 'Resolução de Equação do 1º Grau' });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(exprOriginal || expr)}</div>` });

    if (exprOriginal && exprOriginal !== expr) {
        passos.push({ type: 'intro', content: 'Passo Inicial: Expandir multiplicações e parênteses.' });
        passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(expr)}</div>` });
    }

    passos.push({ type: 'intro', content: 'Passo 1: Agrupar termos com "x" de um lado e números do outro, invertendo os sinais de quem muda de lado.' });

    let sinalC = c >= 0 ? '-' : '+';
    let sinalB = b >= 0 ? '-' : '+';
    let passo1Esquerda = `${a}${varNome} ${sinalC} ${Math.abs(c)}${varNome}`;
    let passo1Direita = `${d} ${sinalB} ${Math.abs(b)}`;
    
    if (c === 0) passo1Esquerda = `${a}${varNome}`;
    if (b === 0) passo1Direita = `${d}`;

    if (c !== 0 || b !== 0) {
        passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${passo1Esquerda} = ${passo1Direita}`)}</div>` });
    }

    let novoA = a - c;
    let novoB = d - b;

    passos.push({ type: 'intro', content: 'Passo 2: Simplificar as operações nos dois lados.' });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${novoA}${varNome} = ${novoB}`)}</div>` });

    if (novoA === 0) {
        if (novoB === 0) {
            passos.push({ type: 'final-html', content: `Resultado Final: Infinitas soluções (Identidade)` });
            mostrarPassosAlgebricos(passos, "Infinitas soluções");
        } else {
            passos.push({ type: 'final-html', content: `Resultado Final: Sem solução (Impossível)` });
            mostrarPassosAlgebricos(passos, "Sem solução");
        }
        return;
    }

    passos.push({ type: 'intro', content: `Passo 3: Isolar a variável passando o coeficiente dividindo para o outro lado.` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome} = (${novoB})/(${novoA})`)}</div>` });

    let x = novoB / novoA;

    if(novoB % novoA !== 0) {
        let div = mdc(novoB, novoA);
        let num = novoB / div;
        let den = novoA / div;
        if(den < 0) { num = -num; den = -den; }
        if(den !== 1 && (num !== novoB || den !== novoA)) {
            passos.push({ type: 'intro', content: 'Simplificando a fração dividindo pelo maior divisor comum:' });
            passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome} = (${num})/(${den})`)}</div>` });
        }
    }

    let resultado = formatarNumero(x);
    passos.push({ type: 'final-html', content: `Resultado Final: ${varNome} = ${resultado}` });

    mostrarPassosAlgebricos(passos, resultado);
}

function resolverEquacaoQuadratica(expr, exprOriginal = null) {
    const [left, right] = expr.split('=');
    const l = extrairCoeficientes(left);
    const r = right ? extrairCoeficientes(right) : {a:0, b:0, c:0};
    
    let varNome = l.v !== 'x' ? l.v : (r.v !== 'x' ? r.v : 'x');

    let a = l.a - r.a;
    let b = l.b - r.b;
    let c = l.c - r.c;

    let passos = [];

    passos.push({ type: 'header', content: 'Resolução de Equação do 2º Grau (Fórmula de Bhaskara)' });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(exprOriginal || expr)}</div>` });

    if (exprOriginal && exprOriginal !== expr) {
        passos.push({ type: 'intro', content: 'Passo Inicial: Expandir multiplicações e parênteses.' });
        passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(expr)}</div>` });
    }

    if (r.a !== 0 || r.b !== 0 || r.c !== 0) {
        passos.push({ type: 'intro', content: 'Passo 1: Passar todos os termos para o lado esquerdo para igualar a zero.' });
        let eqEsquerda = "";
        if (a !== 0) eqEsquerda += `${a}${varNome}^2 `;
        if (b !== 0) eqEsquerda += `${b >= 0 && a !== 0 ? '+' : ''}${b}${varNome} `;
        if (c !== 0) eqEsquerda += `${c >= 0 && (a !== 0 || b !== 0) ? '+' : ''}${c}`;
        if (eqEsquerda === "") eqEsquerda = "0";
        passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(eqEsquerda + " = 0")}</div>` });
    }

    passos.push({ type: 'intro', content: 'Passo 2: Identificar os coeficientes a, b e c da equação.' });
    passos.push({ type: 'html', content: `<div class="conta-visual">a = ${a}<br>b = ${b}<br>c = ${c}</div>` });

    let delta = b*b - 4*a*c;
    let bStr = b < 0 ? `(${b})` : `${b}`;
    let aStr = a < 0 ? `(${a})` : `${a}`;
    let cStr = c < 0 ? `(${c})` : `${c}`;

    passos.push({ type: 'intro', content: 'Passo 3: Calcular o discriminante (Δ) usando a fórmula: Δ = b² − 4ac.' });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`Δ = ${bStr}^2 − 4×${aStr}×${cStr}`)}</div>` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`Δ = ${delta}`)}</div>` });

    if (delta < 0) {
        passos.push({ type: 'intro', content: 'Como Δ < 0, a equação não possui soluções no conjunto dos números reais.' });
        passos.push({ type: 'final-html', content: `Resultado Final: Sem solução real` });
        mostrarPassosAlgebricos(passos, "Sem solução");
        return;
    }

    let x1 = (-b + Math.sqrt(delta)) / (2*a);
    let x2 = (-b - Math.sqrt(delta)) / (2*a);
    let raizDelta = Math.sqrt(delta);
    let den = 2*a;

    passos.push({ type: 'intro', content: `Passo 4: Encontrar as raízes aplicando a fórmula de Bhaskara: ${varNome} = (-b ± √Δ) / 2a.` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome} = (-${bStr} ± √${delta})/(${den})`)}</div>` });
    
    passos.push({ type: 'intro', content: `Calculando ${varNome}₁ (utilizando o sinal positivo):` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome}_1 = (${-b} + ${formatarNumero(raizDelta)})/(${den}) = (${formatarNumero(-b + raizDelta)})/(${den})`)}</div>` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome}_1 = ${formatarNumero(x1)}`)}</div>` });

    passos.push({ type: 'intro', content: `Calculando ${varNome}₂ (utilizando o sinal negativo):` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome}_2 = (${-b} - ${formatarNumero(raizDelta)})/(${den}) = (${formatarNumero(-b - raizDelta)})/(${den})`)}</div>` });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(`${varNome}_2 = ${formatarNumero(x2)}`)}</div>` });

    let resultado = `${varNome}₁=${formatarNumero(x1)}, ${varNome}₂=${formatarNumero(x2)}`;
    if (x1 === x2) resultado = `${varNome}=${formatarNumero(x1)}`;
    
    passos.push({ type: 'final-html', content: `Resultado Final: ${resultado}` });
    mostrarPassosAlgebricos(passos, resultado);
}

function resolverExpressaoAlgebrica(expr, exprOriginal = null) {
    const { a, b, c, v } = extrairCoeficientes(expr);

    let passos = [];

    passos.push({ type: 'header', content: 'Simplificação de Expressão Algébrica' });
    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(exprOriginal || expr)}</div>` });
    
    if (exprOriginal && exprOriginal !== expr) {
        passos.push({ type: 'intro', content: 'Passo Inicial: Expandir multiplicações e parênteses.' });
        passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(expr)}</div>` });
    }
    passos.push({ type: 'intro', content: 'Passo Único: Agrupar os termos semelhantes (somando os valores numéricos que acompanham a mesma variável):' });

    let resultado = "";

    if (a !== 0) resultado += `${a}${v}^2 `;
    if (b !== 0) resultado += `${b >= 0 && a !== 0 ? '+' : ''}${b}${v} `;
    if (c !== 0) resultado += `${c >= 0 && (a !== 0 || b !== 0) ? '+' : ''}${c}`;
    resultado = resultado.trim();
    if (resultado === "") resultado = "0";

    passos.push({ type: 'html', content: `<div class="conta-visual">${formatarParaDisplay(resultado)}</div>` });
    passos.push({ type: 'final-html', content: `Expressão Simplificada: <span style="font-family:'JetBrains Mono', monospace; font-size:1.2rem; font-weight:600; color:var(--success-color);">${formatarParaDisplay(resultado)}</span>` });

    mostrarPassosAlgebricos(passos, resultado.replace(/\^2/g, '²'));
}

function resolverModoAlgebrico(expr) {
    let exprOriginal = expr;
    let exprNorm = expr.replace(/×/g, '*').replace(/−/g, '-').replace(/÷/g, '/').replace(/,/g, '.');
    let partes = exprNorm.split('=');
    let esq = expandirExpressao(partes[0]);
    let dir = partes.length > 1 ? expandirExpressao(partes[1]) : "";
    
    let exprExpandida = dir ? `${esq}=${dir}` : esq;

    let esqDir = exprExpandida.split('=');
    const l = extrairCoeficientes(esqDir[0]);
    const r = esqDir.length > 1 ? extrairCoeficientes(esqDir[1]) : {a:0, b:0, c:0};
    
    let a = l.a - r.a;
    
    if (exprExpandida.includes('=')) {
        if (a !== 0) {
            resolverEquacaoQuadratica(exprExpandida, exprOriginal);
        } else {
            resolverEquacaoLinear(exprExpandida, exprOriginal);
        }
    } else {
        resolverExpressaoAlgebrica(exprExpandida, exprOriginal);
    }
}

function mostrarPassosAlgebricos(passos, resultado) {
    ultimosPassos = passos;
    displayValue.textContent = resultado;
    displayValue.classList.remove("erro");
}

// ===== FIM MOTOR ALGÉBRICO =====

let calcLock = false;

function calcular() {
    if (calcLock) return;
    calcLock = true;
    setTimeout(() => calcLock = false, 300);

    let estavaAberto = detalhesDiv.style.display === "block";
    
    ultimosPassos = []; 
    detalhesDiv.innerHTML = ""; 
    detalhesDiv.style.display = "none";
    
    if (!expressao) { 
        displayValue.textContent = "0"; 
        return; 
    }
    
    let exprParaCalc = expressao;

    // ===== DETECÇÃO AUTOMÁTICA DE MODO ALGÉBRICO BLINDADA =====
    let strSemFuncoes = exprParaCalc.replace(/(sin|cos|tan|asin|acos|atan|lg|ln|sqrt|pi|e)/ig, '');
    if (/(?<![a-zA-Z])([a-zA-ZΔθλμΩ])(?![a-zA-Z])|=/.test(strSemFuncoes)) {
        try {
            resolverModoAlgebrico(exprParaCalc);
            salvarHistorico(expressao, displayValue.textContent, ultimosPassos);
        } catch (error) {
            displayValue.textContent = "Erro";
            displayValue.classList.add("erro");
            ultimosPassos.push({ type: 'error', content: error.message });
        }
        if (estavaAberto) mostrarDetalhes();
        return;
    }
    // ===== FIM DETECÇÃO =====

    if (/!{2,}/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; 
        displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Fatorial duplicado inválido" });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }

    if (/^\(\s*\)$/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; 
        displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Expressão vazia" });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }
    
    if (/[+\-×÷^/]$/.test(exprParaCalc)) {
        displayValue.textContent = "Erro"; 
        displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "A expressão não pode terminar com um operador." });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }
    
    const abertos = (exprParaCalc.match(/\(/g) || []).length; 
    const fechados = (exprParaCalc.match(/\)/g) || []).length;
    if (abertos !== fechados) {
        displayValue.textContent = "Erro"; 
        displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: "Parênteses desbalanceados." });
        if (estavaAberto) mostrarDetalhes(); 
        return;
    }

    try {
        const tokens = tokenize(exprParaCalc); 
        const rpn = toRPN(tokens);
        ultimosPassos.push({ type: 'intro', content: `Analisando: ${escapeHTML(exprParaCalc)}` });
        const { result, logs } = evalRPNwithSteps(rpn);
        ultimosPassos = ultimosPassos.concat(logs);
        let resultadoFormatado = formatarNumero(result);
        displayValue.textContent = resultadoFormatado; 
        displayValue.classList.remove("erro");
        salvarHistorico(expressao, resultadoFormatado, ultimosPassos);
    } catch (error) {
        displayValue.textContent = "Erro"; 
        displayValue.classList.add("erro");
        ultimosPassos.push({ type: 'error', content: error.message });
    }
    
    if (estavaAberto) mostrarDetalhes();
}

function salvarHistorico(expr, res, passos) {
    historico.unshift({ id: Date.now(), expressao: expr, resultado: res, passos: passos });
    if (historico.length > 50) historico.pop();
    localStorage.setItem("calcHistorico", JSON.stringify(historico));
}

if(historicoBtn) {
    historicoBtn.addEventListener("click", () => {
        detalhesDiv.style.display = "none";
        if (historicoDiv.style.display !== "block") {
            historicoDiv.style.display = "block"; 
            historicoDiv.innerHTML = "";
            if (historico.length) {
                historico.forEach(reg => {
                    const itemDiv = document.createElement("div");
                    itemDiv.innerHTML = `<small>${escapeHTML(reg.expressao)}</small> = ${escapeHTML(String(reg.resultado))}`;
                    itemDiv.onclick = () => carregarDoHistorico(reg.id);
                    historicoDiv.appendChild(itemDiv);
                });
            } else { 
                historicoDiv.innerHTML = "Nenhum cálculo no histórico."; 
            }
        } else { 
            historicoDiv.style.display = "none"; 
        }
    });
}

function carregarDoHistorico(id) {
    const registro = historico.find(h => h.id === id); 
    if (!registro) return;
    expressao = registro.expressao; 
    displayExpr.innerHTML = formatarParaDisplay(expressao);
    displayValue.textContent = registro.resultado; 
    displayValue.classList.remove("erro");
    ultimosPassos = registro.passos; 
    historicoDiv.style.display = "none"; 
    mostrarDetalhes();
}

if(detalhesBtn) {
    detalhesBtn.addEventListener("click", mostrarDetalhes);
}

function mostrarDetalhes() {
    historicoDiv.style.display = "none";
    if (detalhesDiv.style.display !== "block") {
        detalhesDiv.style.display = "block"; 
        let html = '';
        if (ultimosPassos.length) {
            ultimosPassos.forEach(passo => {
                if(passo.type === 'intro') html += `<pre class="info">${passo.content}</pre>`;
                if(passo.type === 'visual') html += `<pre class="info">${passo.content}</pre>`;
                if(passo.type === 'html') html += passo.content;
                if(passo.type === 'header') html += `<h3>${passo.content}</h3>`;
                if(passo.type === 'final') html += `<pre class="info resultado-final">${passo.content}</pre>`;
                if(passo.type === 'final-html') html += `<div class="info resultado-final" style="padding:15px; font-family:'Inter', sans-serif;">${passo.content}</div>`;
                if(passo.type === 'error') html += `<pre class="info erro-didatico">⚠️ ${passo.content}</pre>`;
            });
        } else { 
            html = "<pre class='info'>Faça um cálculo para ver os detalhes.</pre>"; 
        }
        detalhesDiv.innerHTML = html;
    } else { 
        detalhesDiv.style.display = "none"; 
    }
}

atualizarDisplay();

document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (/[0-9\,\.\+\-\*\/\(\)\%\^!]/.test(key)) {
        e.preventDefault();
        let val = key;
        if (val === '.') val = ',';
        if (val === '*') val = '×';
        if (val === '/') val = '÷';
        if (val === '-') val = '−';
        adicionarInput(val);
    } else if (key === 'Enter' || key === '=') { 
        e.preventDefault(); 
        calcular(); 
    } 
    else if (key === 'Backspace') { 
        e.preventDefault(); 
        apagarUltimo(); 
    } 
    else if (key === 'Escape') { 
        e.preventDefault(); 
        limparTudo(); 
    }
});

document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        if (navigator.vibrate) navigator.vibrate(40); // Feedback táctil leve
    });
});

let touchStartX = 0;
const displayEl = document.querySelector('.display');
displayEl.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
displayEl.addEventListener('touchend', e => {
    if (e.changedTouches[0].screenX < touchStartX - 40) { // Swipe pra esquerda apaga último
        apagarUltimo();
        if (navigator.vibrate) navigator.vibrate(40);
    }
}, {passive: true});
</script>
